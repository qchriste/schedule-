<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WORLD'S WORST FISHING GAME™</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Permanent+Marker&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a1a2a; font-family: 'Boogaloo','Comic Sans MS',cursive;
  overflow: hidden;
  cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><text y='28' font-size='28'>🎣</text></svg>") 8 28, auto;
}
#title { font-family:'Permanent Marker',cursive; font-size:clamp(12px,2vw,20px); color:#ff0066;
  text-shadow:2px 2px 0 #000,0 0 12px #ff006699; letter-spacing:-1px;
  position:fixed; top:5px; left:50%; transform:translateX(-50%);
  pointer-events:none; z-index:25; white-space:nowrap;
  animation:titleWobble 0.4s infinite alternate; }
@keyframes titleWobble { from{transform:translateX(-50%) rotate(-1deg)} to{transform:translateX(-50%) rotate(1deg)} }
#subtitle { display:none; }
@keyframes blink { 50%{opacity:0} }
#game-wrap { position:fixed; top:0; left:0; right:0; bottom:44px; }
#canvas { display:block; width:100%; height:100%; }
#ui-bar { position:fixed; bottom:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  background:#050f18cc; border-top:3px solid #ff0066; padding:5px 12px; gap:8px; flex-wrap:wrap;
  backdrop-filter:blur(4px); z-index:20; }
.stat { font-size:11px; color:#ffcc00; text-shadow:1px 1px 0 #000; }
.stat span { color:#ff6600; }
#cast-btn { font-family:'Permanent Marker',cursive; font-size:15px;
  background:linear-gradient(180deg,#ff6600,#cc3300); color:#fff; border:3px solid #ffcc00;
  padding:5px 16px; cursor:pointer; border-radius:4px; text-shadow:1px 1px 0 #000;
  box-shadow:0 4px 0 #660000; animation:btnPulse 1.5s ease-in-out infinite; }
#cast-btn:active { transform:translateY(4px); box-shadow:0 0 0 #660000; }
#cast-btn:disabled { background:#444; box-shadow:none; animation:none; color:#888; border-color:#666; }
@keyframes btnPulse {
  0%,100%{box-shadow:0 4px 0 #660000,0 0 0px #ff6600}
  50%{box-shadow:0 4px 0 #660000,0 0 12px #ff6600} }
#shop-btn, #boat-btn {
  font-family:'Permanent Marker',cursive; font-size:13px; color:#000;
  border:3px solid #fff; padding:5px 12px; cursor:pointer; border-radius:4px; }
#shop-btn { background:linear-gradient(180deg,#ffcc00,#cc9900); box-shadow:0 3px 0 #886600; }
#boat-btn { background:linear-gradient(180deg,#88ddff,#3399cc); box-shadow:0 3px 0 #115588; }
#shop-btn:active,#boat-btn:active { transform:translateY(3px); box-shadow:none; }
#message-box { position:absolute; bottom:50px; left:50%; transform:translateX(-50%);
  background:#000000cc; border:3px solid #ffcc00; border-radius:8px; padding:8px 16px;
  color:#fff; font-size:14px; text-align:center; pointer-events:none; max-width:90%;
  opacity:0; transition:opacity 0.3s; z-index:10; text-shadow:1px 1px 0 #000; }
#message-box.show { opacity:1; }
#reel-btn { font-family:'Boogaloo',cursive; font-size:13px;
  background:linear-gradient(180deg,#00aa44,#006622); color:#fff;
  border:3px solid #00ff88; padding:5px 14px; cursor:pointer; border-radius:4px;
  box-shadow:0 3px 0 #003311; display:none; }
#reel-btn:active { transform:translateY(3px); box-shadow:none; }
#caught-popup { position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0); background:#000; border:5px solid #ffcc00;
  border-radius:12px; padding:24px 32px; text-align:center; z-index:200;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 0 60px #ffcc0088; }
#caught-popup.show { transform:translate(-50%,-50%) scale(1); }
#caught-popup .fish-emoji { font-size:64px; animation:fishWiggle 0.3s ease-in-out infinite alternate; }
@keyframes fishWiggle { from{transform:rotate(-10deg)} to{transform:rotate(10deg)} }
#caught-popup h2 { font-family:'Permanent Marker',cursive; color:#ffcc00; font-size:28px; margin:8px 0; }
#caught-popup p { color:#fff; font-size:14px; margin:4px 0; }
#popup-money { font-family:'Permanent Marker',cursive; color:#00ff88; font-size:22px; margin:6px 0; }
#caught-popup button { margin-top:12px; font-family:'Boogaloo',cursive; font-size:16px;
  background:#ff0066; color:#fff; border:3px solid #fff; padding:8px 24px;
  cursor:pointer; border-radius:6px; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:150; }
.modal-overlay.open { display:block; }
.modal-box { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
  background:#0a0a1a; border:5px solid #ffcc00; border-radius:12px; padding:20px 24px;
  z-index:160; width:90%; max-width:480px; max-height:85vh; overflow-y:auto;
  box-shadow:0 0 60px #ffcc0066; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.modal-box.open { transform:translate(-50%,-50%) scale(1); }
.modal-box h2 { font-family:'Permanent Marker',cursive; color:#ffcc00; font-size:24px; text-align:center; margin-bottom:4px; }
.modal-money { text-align:center; color:#00ff88; font-family:'Permanent Marker',cursive; font-size:17px; margin-bottom:12px; }
.modal-close { display:block; margin:14px auto 0; font-family:'Boogaloo',cursive; font-size:15px;
  background:#330000; color:#fff; border:2px solid #ff0066; padding:6px 20px; cursor:pointer; border-radius:6px; }
.shop-item { background:#111122; border-radius:8px; padding:10px 12px; margin-bottom:10px;
  border:2px solid #444; display:flex; flex-direction:column; gap:4px; }
.shop-item.equipped,.shop-item.owned-item { border-color:#ffcc00; }
.shop-item.owned-green { border-color:#00cc44; }
.shop-item.locked-item { border-color:#333; opacity:0.7; }
.shop-item-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.item-name  { font-family:'Permanent Marker',cursive; color:#ffcc00; font-size:13px; }
.item-desc  { color:#aaa; font-size:11px; font-style:italic; }
.item-stats { color:#88ccff; font-size:11px; }
.shop-btn-group { font-family:'Boogaloo',cursive; font-size:12px; padding:4px 10px;
  border-radius:4px; cursor:pointer; border:2px solid transparent; white-space:nowrap; flex-shrink:0; }
.btn-equipped  { background:#555; color:#aaa; border-color:#777; cursor:default; }
.btn-equip     { background:#00aa44; color:#fff; border-color:#00ff88; }
.btn-buy-rod   { background:#cc6600; color:#fff; border-color:#ffaa00; }
.btn-buy-boat  { background:#115588; color:#fff; border-color:#44aadd; }
.btn-locked    { background:#333; color:#666; border-color:#444; cursor:default; }
.btn-owned     { background:#224400; color:#88ff44; border-color:#44aa00; cursor:default; }
</style>
</head>
<body>

<div id="title">🎣 WORLD'S WORST FISHING GAME™</div>
<div id="subtitle">★ NOW WITH PIRATES · UPGRADES · 40% MORE DISAPPOINTMENT ★</div>

<div id="game-wrap">
  <canvas id="canvas"></canvas>
  <div id="message-box"></div>
</div>

<div id="ui-bar">
  <div class="stat">FISH: <span id="fish-count">0</span></div>
  <div class="stat">MISSES: <span id="miss-count">0</span></div>
  <div class="stat">💰 $<span id="money-stat">0</span></div>
  <div class="stat">☠ KILLS: <span id="kills-stat">0</span></div>
  <div class="stat">ROD: <span id="rod-stat">Grandpa's Twig™</span></div>
  <button id="shop-btn"  onclick="openShop()">🏪 RODS</button>
  <button id="boat-btn"  onclick="openBoatShop()">⚓ BOAT</button>
  <button id="cast-btn"  onclick="cast()">🎣 CAST!</button>
  <button id="reel-btn"  onclick="reel()">🔄 REEL!</button>
</div>

<!-- Rod Shop -->
<div id="shop-overlay"  class="modal-overlay" onclick="closeShop()"></div>
<div id="shop-modal"    class="modal-box">
  <h2>🏪 ROD SHOP</h2>
  <div id="shop-money-display" class="modal-money">💰 $0</div>
  <div id="rod-list"></div>
  <button class="modal-close" onclick="closeShop()">Close</button>
</div>

<!-- Boat Shop -->
<div id="boat-overlay"  class="modal-overlay" onclick="closeBoatShop()"></div>
<div id="boat-modal"    class="modal-box">
  <h2>⚓ BOAT UPGRADES</h2>
  <div id="boat-money-display" class="modal-money">💰 $0</div>
  <div id="boat-upgrade-list"></div>
  <button class="modal-close" onclick="closeBoatShop()">Close</button>
</div>

<!-- Fish popup -->
<div id="caught-popup">
  <div class="fish-emoji" id="popup-emoji">🐟</div>
  <h2 id="popup-title">YOU CAUGHT SOMETHING!</h2>
  <p id="popup-name"></p>
  <p id="popup-desc"></p>
  <p id="popup-money"></p>
  <button id="popup-btn" onclick="dismissPopup()">Sad... OK</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight - 44;
const W = canvas.width, H = canvas.height;

// ── Audio ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq,dur,type='sine',vol=0.2,delay=0){
  const t=AC.currentTime+delay, o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur);
}
function playSplash(){ beep(200,.15,'sawtooth',.3); beep(150,.3,'sawtooth',.2,.1); }
function playCatch() { [523,659,784,1047].forEach((f,i)=>beep(f,.12,'square',.25,i*.1)); }
function playFail()  { [300,250,180,120].forEach((f,i)=>beep(f,.15,'sawtooth',.25,i*.1)); }
function playReel()  { beep(800,.03,'square',.1); }
function playShot()  { beep(550,.04,'square',.18); beep(280,.1,'sawtooth',.12,.03); }
function playHit()   { beep(200,.12,'sawtooth',.3); beep(120,.18,'sawtooth',.2,.06); }
function playSink()  { [440,330,220,140,80].forEach((f,i)=>beep(f,.18,'sawtooth',.28,i*.09)); }
function playPirateFire(){ beep(180,.08,'sawtooth',.2); beep(100,.15,'sawtooth',.15,.06); }

// ── Rod definitions ────────────────────────────────────────────────────────
const ROD_DEFS = [
  { name:"Grandpa's Twig™",     price:0,     waitMult:1.00, rarityBonus:0,  moneyMult:1.0, desc:"It's literally a stick from the yard." },
  { name:"Pool Noodle Rod™",    price:50,    waitMult:0.88, rarityBonus:1,  moneyMult:1.2, desc:"Floats if you drop it. Barely works." },
  { name:"Bamboo Classic",       price:130,   waitMult:0.75, rarityBonus:2,  moneyMult:1.4, desc:"Old school. Surprisingly okay." },
  { name:"The Decent Rod",       price:300,   waitMult:0.62, rarityBonus:4,  moneyMult:1.7, desc:"An actual fishing rod. Whoa." },
  { name:"Carbon Fiber 3000",    price:650,   waitMult:0.50, rarityBonus:6,  moneyMult:2.0, desc:"You feel like a professional fraud." },
  { name:"Pro Angler™",          price:1400,  waitMult:0.40, rarityBonus:9,  moneyMult:2.5, desc:"People on the dock nod at you now." },
  { name:"Deep Sea Deluxe",      price:3000,  waitMult:0.30, rarityBonus:13, moneyMult:3.0, desc:"Built for the open ocean. Very shiny." },
  { name:"Titan Rod X",          price:6500,  waitMult:0.22, rarityBonus:18, moneyMult:3.8, desc:"Titanium alloy. Catches things you shouldn't." },
  { name:"Legendary Kraken Rod", price:14000, waitMult:0.14, rarityBonus:25, moneyMult:5.0, desc:"Forged in the depths by something ancient." },
  { name:"The Godfish Rod™",     price:30000, waitMult:0.08, rarityBonus:35, moneyMult:7.0, desc:"Every cast is destiny. Every fish is fate." },
];

// ── Boat upgrade definitions ────────────────────────────────────────────────
const BOAT_UPGRADES = [
  { name:"Reinforced Hull",      price:40000,  icon:"🛡",  stat:"50% less stolen when boarded",             desc:"Steel-plated hull shrugs off grappling hooks." },
  { name:"Upgraded Engine",      price:65000,  icon:"⚡",  stat:"+45% speed & acceleration",                desc:"Racing outboard. Terrifyingly loud." },
  { name:"Rapid-Fire Cannon",    price:90000,  icon:"💣",  stat:"2× cannonball fire rate",                  desc:"Spring-loaded powder loader. Still dangerous to self." },
  { name:"Extended Fishing Rig", price:120000, icon:"🎣",  stat:"+50% cast distance · more reel time",      desc:"Carbon-fiber boom and deep-sea line." },
  { name:"Armor Plating",        price:160000, icon:"⚔️", stat:"70% less damage from pirate cannonballs",  desc:"Angled bow plates deflect incoming fire." },
  { name:"Cannonball Magazine",  price:220000, icon:"🔫",  stat:"+50% bullet speed & range",                desc:"High-velocity black powder charge." },
  { name:"Deep Radar",           price:300000, icon:"📡",  stat:"2× radar range · spot pirates sooner",     desc:"Military-grade rotating sonar dome." },
  { name:"Dread Vessel Refit",   price:500000, icon:"💀",  stat:"Golden hull · stacks all + 20% bonus",     desc:"Full dreadnought conversion. Pirates hesitate." },
];

// ── Pirate tiers ───────────────────────────────────────────────────────────
const PIRATE_TIERS = [
  { tier:1, name:"Scallywag",    hp:3,  speed:2.1, accel:0.14, size:0.85,
    rewardMin:100,  rewardMax:250,  stealPct:0.12, stealFlat:15,
    fireInterval:0,   bulletSpeed:0, bulletSteal:0,
    hullColor:"#2a1205", deckColor:"#4a2008", hpBarColor:"#cc2200", minKills:0 },
  { tier:2, name:"Sea Dog",      hp:5,  speed:2.6, accel:0.17, size:1.15,
    rewardMin:250,  rewardMax:500,  stealPct:0.18, stealFlat:30,
    fireInterval:0,   bulletSpeed:0, bulletSteal:0,
    hullColor:"#1a0c00", deckColor:"#3d1a08", hpBarColor:"#ff8800", minKills:5 },
  { tier:3, name:"Corsair",      hp:7,  speed:3.1, accel:0.20, size:1.35,
    rewardMin:500,  rewardMax:900,  stealPct:0.25, stealFlat:60,
    fireInterval:150, bulletSpeed:6, bulletSteal:80,
    hullColor:"#2a0a0a", deckColor:"#2a1505", hpBarColor:"#ff4400", minKills:15 },
  { tier:4, name:"Dread Pirate", hp:10, speed:3.8, accel:0.24, size:1.6,
    rewardMin:1000, rewardMax:2000, stealPct:0.35, stealFlat:150,
    fireInterval:90,  bulletSpeed:8, bulletSteal:200,
    hullColor:"#0a0a0a", deckColor:"#200808", hpBarColor:"#8800cc", minKills:30 },
];

// ── Fish database ──────────────────────────────────────────────────────────
const FISH_DB = [
  { emoji:'🥾', name:'Old Boot',           desc:'"Smells like the sea... and regret."',      pts:0,    rarity:22, value:2    },
  { emoji:'🧦', name:'Wet Sock',            desc:'"Not even a matching pair."',               pts:0,    rarity:18, value:2    },
  { emoji:'📱', name:'Cracked iPhone',      desc:'"Still has 3 unread texts."',               pts:2,    rarity:10, value:3    },
  { emoji:'🦆', name:'Rubber Duck',         desc:'"Squeaks judgmentally."',                   pts:1,    rarity:15, value:2    },
  { emoji:'⚓',  name:'Lost Anchor',         desc:'"Some other boat\'s problem now."',         pts:0,    rarity:16, value:1    },
  { emoji:'🐟', name:'Tiny Fish',           desc:'"In this WHOLE OCEAN?? TINY???"',           pts:5,    rarity:30, value:8    },
  { emoji:'🐡', name:'Pufferfish',          desc:'"It bit you. -2 dignity."',                 pts:8,    rarity:12, value:12   },
  { emoji:'🐬', name:'Bottlenose Dolphin',  desc:'"Unhooked itself. Still laughing at you."', pts:40,   rarity:16, value:50   },
  { emoji:'🐙', name:'Giant Octopus',       desc:'"Eight arms, zero respect for you."',       pts:30,   rarity:12, value:40   },
  { emoji:'🦑', name:'Colossal Squid',      desc:'"Ink EVERYWHERE. Your entire soul."',       pts:150,  rarity:8,  value:180  },
  { emoji:'🦞', name:'Monster Lobster',     desc:'"Size of a golden retriever. Red now."',    pts:80,   rarity:12, value:100  },
  { emoji:'💀', name:'Fish Skeleton',       desc:'"Was already eaten. By WHAT???"',           pts:0,    rarity:8,  value:1    },
  { emoji:'🦈', name:'Great White Shark',   desc:'"It bit the boat. The boat is fine(ish)."', pts:200,  rarity:8,  value:250  },
  { emoji:'🐠', name:'Pristine Coral Fish', desc:'"It\'s perfect. You feel guilty."',         pts:100,  rarity:10, value:130  },
  { emoji:'🧲', name:'Fridge Magnet',       desc:'"Souvenir from 1987."',                     pts:0,    rarity:6,  value:2    },
  { emoji:'🐋', name:'BLUE WHALE',          desc:'"Sir. SIR. That is a whale. Put it back."', pts:1000, rarity:3,  value:2000 },
];

function rollFish() {
  const bonus = ROD_DEFS[currentRodIdx].rarityBonus;
  const pool  = FISH_DB.map(f => ({ ...f, er: f.pts >= 30 ? f.rarity + bonus : f.rarity }));
  const total = pool.reduce((s,f) => s + f.er, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) { r -= pool[i].er; if (r <= 0) return FISH_DB[i]; }
  return FISH_DB[0];
}

// ── Game state ─────────────────────────────────────────────────────────────
let state = 'idle';
let fishCount = 0, missCount = 0, money = 0, pirateKills = 0;
let currentRodIdx = 0;
let ownedRods = new Array(10).fill(false); ownedRods[0] = true;
let ownedUpgrades = new Array(8).fill(false);
let shopOpen = false, boatShopOpen = false;
let line = { x:0, y:0, tx:0, ty:0, progress:0, bobY:0, bobDir:1 };
let particles = [], ripples = [], wakeParticles = [];
let biteTimer = 0, biteWindow = 0;
let frame = 0;
let currentFish = null, lineSnapped = false, msgTimeout = null;

// ── Boat ───────────────────────────────────────────────────────────────────
let boat = { x:W/2, y:H/2, angle:-Math.PI/2, vx:0, vy:0 };
let bowX = boat.x, bowY = boat.y - 38;

// ── Boat scale grows with each upgrade purchased ───────────────────────────
function getBoatScale() {
  return 1 + ownedUpgrades.filter(Boolean).length * 0.09;
}

// ── Derived boat stats ──────────────────────────────────────────────────────
function getBoatStats() {
  const u = ownedUpgrades, dread = u[7];
  return {
    maxSpd:          (u[1] ? 6.5 : 4.5) + (dread ? 1.0 : 0),
    accel:            u[1] ? 0.55 : 0.38,
    boardDmgMult:    (u[0] ? 0.5 : 1.0) * (dread ? 0.6 : 1.0),
    shotCooldown:     u[2] ? 9 : 18,
    castDistMult:     u[3] ? 1.5 : 1.0,
    biteWindowBonus:  u[3] ? 1000 : 0,
    pirateBulletMult:(u[4] ? 0.3 : 1.0) * (dread ? 0.7 : 1.0),
    bulletSpeed:      u[5] ? 15 : 10,
    bulletDecay:      u[5] ? 0.007 : 0.011,
    radarMult:        u[6] ? 2.0 : 1.0,
    alertDist:        u[6] ? 500 : 260,
  };
}

// ── Islands ────────────────────────────────────────────────────────────────
const ISLAND_COLORS = ['#e8d5a0','#d4c080','#f0e0b0','#ddc890'];
const islands = Array.from({ length:8 }, (_,i) => {
  const angle = (i/8)*Math.PI*2 + Math.random()*0.8;
  const dist  = 300 + Math.random()*W*1.5;
  const r     = 38 + Math.random()*55;
  return {
    x: boat.x + Math.cos(angle)*dist, y: boat.y + Math.sin(angle)*dist,
    r, sandColor: ISLAND_COLORS[i%4], hasJungle: r>55,
    palmAngles: Array.from({ length:2+Math.floor(Math.random()*3) }, ()=>Math.random()*Math.PI*2),
    rocks: Array.from({ length:Math.floor(Math.random()*4) }, ()=>({
      dx:(Math.random()-.5)*1.7, dy:(Math.random()-.5)*1.7, r:5+Math.random()*9 })),
  };
});

// ── Pirates & bullets ──────────────────────────────────────────────────────
let pirates = [], pirateBullets = [];
let pirateSpawnTimer = 900;
const PIRATE_SPAWN_INTERVAL = 1500;

function selectPirateTier() {
  const available = PIRATE_TIERS.filter(t => pirateKills >= t.minKills);
  const baseW = [60, 30, 15, 8];
  const weights = available.map(t => baseW[t.tier-1]);
  const total = weights.reduce((a,b)=>a+b, 0);
  let r = Math.random() * total;
  for (let i=0; i<available.length; i++) { r -= weights[i]; if (r<=0) return available[i]; }
  return available[available.length-1];
}

function spawnPirate() {
  const tier = selectPirateTier();
  const ang  = Math.random() * Math.PI * 2;
  const dist = Math.max(W,H) * 0.75;
  pirates.push({
    x: boat.x + Math.cos(ang)*dist, y: boat.y + Math.sin(ang)*dist,
    angle: ang + Math.PI, vx:0, vy:0,
    hp: tier.hp, maxHp: tier.hp, tier,
    hitFlash:0, boardTimer:0, alertShown:false, deathTimer:-1,
    fireTimer: Math.floor(Math.random() * Math.max(1, tier.fireInterval || 200)),
  });
}

// ── Player bullets & explosions ────────────────────────────────────────────
let bullets = [], explosions = [];
let lastShotFrame = -999;

// ── Caustics ───────────────────────────────────────────────────────────────
const caustics = Array.from({ length:12 }, ()=>({
  x: boat.x+(Math.random()-.5)*W, y: boat.y+(Math.random()-.5)*H,
  vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
  rx:22+Math.random()*55, ry:13+Math.random()*28,
  phase:Math.random()*Math.PI*2, rot:Math.random()*Math.PI,
}));

// ── Sun sparkles (surface glint) ──────────────────────────────────────────
const sparkles = Array.from({ length:55 }, ()=>({
  x: boat.x+(Math.random()-.5)*W*2.8,
  y: boat.y+(Math.random()-.5)*H*2.8,
  phase: Math.random()*Math.PI*2,
  freq:  0.04+Math.random()*0.07,
  size:  1.2+Math.random()*2.8,
}));

const cloudShadows = [

// ── Helpers ────────────────────────────────────────────────────────────────
function wrapToCamera(coord, cam, size) {
  const half = size/2 + 80;
  if (coord < cam-half) return coord + (size+160);
  if (coord > cam+half) return coord - (size+160);
  return coord;
}
function addParticles(x,y,color,count) {
  for (let i=0; i<count; i++)
    particles.push({ x,y,color, vx:(Math.random()-.5)*6, vy:(Math.random()-.5)*6,
      life:1, decay:.03+Math.random()*.03, r:3+Math.random()*4 });
}
function addRipple(x,y) { ripples.push({ x,y, r:3, maxR:35+Math.random()*20, life:1 }); }

// ── Rod Shop ───────────────────────────────────────────────────────────────
function renderShop() {
  document.getElementById('shop-money-display').textContent = '💰 $'+money;
  const list = document.getElementById('rod-list'); list.innerHTML='';
  ROD_DEFS.forEach((rod,i) => {
    const isEq=i===currentRodIdx, isOwned=ownedRods[i];
    const spd = Math.round((1-rod.waitMult)*100);
    const item = document.createElement('div');
    item.className='shop-item '+(isEq?'equipped':isOwned?'owned-green':'locked-item');
    const btn = isEq
      ? `<button class="shop-btn-group btn-equipped" disabled>Equipped</button>`
      : isOwned
      ? `<button class="shop-btn-group btn-equip" onclick="equipRod(${i})">Equip</button>`
      : money>=rod.price
      ? `<button class="shop-btn-group btn-buy-rod" onclick="buyRod(${i})">Buy $${rod.price}</button>`
      : `<button class="shop-btn-group btn-locked" disabled>$${rod.price} 🔒</button>`;
    item.innerHTML=`<div class="shop-item-header"><div>
      <div class="item-name">${i+1}. ${rod.name}</div>
      <div class="item-desc">${rod.desc}</div>
      <div class="item-stats">⚡${spd}% faster · 💰${rod.moneyMult}x · 🐟+${rod.rarityBonus} luck</div>
      </div>${btn}</div>`;
    list.appendChild(item);
  });
}
function openShop()  { shopOpen=true;  renderShop(); document.getElementById('shop-overlay').classList.add('open');  document.getElementById('shop-modal').classList.add('open'); }
function closeShop() { shopOpen=false; document.getElementById('shop-overlay').classList.remove('open'); document.getElementById('shop-modal').classList.remove('open'); }
function buyRod(i) {
  if (ownedRods[i]||money<ROD_DEFS[i].price) return;
  money-=ROD_DEFS[i].price; ownedRods[i]=true; currentRodIdx=i;
  document.getElementById('rod-stat').textContent=ROD_DEFS[i].name;

function equipRod(i) {
  if (!ownedRods[i]) return; currentRodIdx=i;
  document.getElementById('rod-stat').textContent=ROD_DEFS[i].name; renderShop();
}

function cast() {
  if (state!=='idle') return;
  AC.resume(); state='casting';
  document.getElementById('cast-btn').disabled=true;
  document.getElementById('reel-btn').style.display='none';
  lineSnapped=false;
  const stats=getBoatStats();
  const wobble=(Math.random()-.5)*.55;
  const castAngle=boat.angle+wobble;
  const castDist=(110+Math.random()*100)*stats.castDistMult;
  const sx=boat.x+Math.cos(boat.angle)*38, sy=boat.y+Math.sin(boat.angle)*38;
  line={ x:sx, y:sy, tx:sx+Math.cos(castAngle)*castDist, ty:sy+Math.sin(castAngle)*castDist,
    progress:0, bobDir:1, bobY:0 };
  if (Math.abs(wobble)>.25) showMsg("Wait... that went the wrong way?");
}
function reel() {
  if (state!=='biting') return;
  state='reeling'; document.getElementById('reel-btn').style.display='none';
  playReel();
  if (Math.random()<.08) { showMsg("It snapped the line! So close...",3000); setTimeout(()=>fishEscaped(),350); return; }
  showMsg("Reeling it in...",1000); setTimeout(catchFish,600);
}
function fishEscaped() {
  state='idle'; missCount++;
  document.getElementById('miss-count').textContent=missCount;
  document.getElementById('cast-btn').disabled=false;
  document.getElementById('reel-btn').style.display='none';
  playFail(); lineSnapped=true;
  addParticles(line.tx,line.ty,'#8B6914',8);
  showMsg(MISS_MSGS[Math.floor(Math.random()*MISS_MSGS.length)],3500);
  setTimeout(()=>{ lineSnapped=false; },1500);
}
function catchFish() {
  const rod=ROD_DEFS[currentRodIdx];
  const earned=Math.round(currentFish.value*rod.moneyMult);
  money+=earned; state='idle'; fishCount++;
  document.getElementById('fish-count').textContent=fishCount;
  document.getElementById('money-stat').textContent=money;
  document.getElementById('cast-btn').disabled=false;
  playCatch(); addParticles(line.tx,line.ty,'#00aaff',20);
  showFishPopup(currentFish,earned); line.progress=0;
}

});

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  frame++;
  const stats = getBoatStats();

  // Boat movement
  const DRAG=.88; let mx=0,my=0;
  if (!shopOpen&&!boatShopOpen) {
    if (keys['KeyA']) mx-=stats.accel; if (keys['KeyD']) mx+=stats.accel;
    if (keys['KeyW']) my-=stats.accel; if (keys['KeyS']) my+=stats.accel;
  }
  if (mx&&my) { mx*=.707; my*=.707; }
  boat.vx=(boat.vx+mx)*DRAG; boat.vy=(boat.vy+my)*DRAG;
  const spd=Math.sqrt(boat.vx*boat.vx+boat.vy*boat.vy);
  if (spd>stats.maxSpd) { boat.vx=boat.vx/spd*stats.maxSpd; boat.vy=boat.vy/spd*stats.maxSpd; }
  if (spd<.04) { boat.vx=0; boat.vy=0; }
  boat.x+=boat.vx; boat.y+=boat.vy;
  if (spd>.3) {
    const target=Math.atan2(boat.vy,boat.vx); let da=target-boat.angle;
    while(da>Math.PI) da-=Math.PI*2; while(da<-Math.PI) da+=Math.PI*2;
    boat.angle+=da*.11;
  }
  const bs=getBoatScale();
  bowX=boat.x+Math.cos(boat.angle)*38*bs; bowY=boat.y+Math.sin(boat.angle)*38*bs;

  // Island collision
  islands.forEach(isl=>{
    isl.x=wrapToCamera(isl.x,boat.x,W); isl.y=wrapToCamera(isl.y,boat.y,H);
    const idx=boat.x-isl.x, idy=boat.y-isl.y, id=Math.sqrt(idx*idx+idy*idy);
    const boatR=22*getBoatScale();
    if (id<isl.r+boatR&&id>.1) { const p=(isl.r+boatR-id)/id; boat.x+=idx*p*.35; boat.y+=idy*p*.35; boat.vx*=.4; boat.vy*=.4; }
  });

  // Wake
  if (spd>.5&&frame%3===0) {
    const sx=boat.x-Math.cos(boat.angle)*32, sy=boat.y-Math.sin(boat.angle)*32;
    wakeParticles.push({x:sx+(Math.random()-.5)*8,y:sy+(Math.random()-.5)*8,r:2+Math.random()*3,life:1,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4});
  }
  wakeParticles=wakeParticles.filter(w=>w.life>0);
  wakeParticles.forEach(w=>{w.x+=w.vx;w.y+=w.vy;w.r+=.45;w.life-=.019;});

  // Fish schools
  fishies.forEach(f=>{
    f.scx+=Math.cos(f.sang)*f.sspd; f.scy+=Math.sin(f.sang)*f.sspd; f.sang+=(Math.random()-.5)*.008;
    const dx=f.scx-f.x, dy=f.scy-f.y, d=Math.sqrt(dx*dx+dy*dy);
    if (d>25) { const ta=Math.atan2(dy,dx); let da=ta-f.angle; while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2; f.angle+=da*.07; }
    else { f.angle+=f.turnRate+Math.sin(f.wobble+frame*.007)*.012; }
    f.wobble+=.018; f.x+=Math.cos(f.angle)*f.speed; f.y+=Math.sin(f.angle)*f.speed;
    f.x=wrapToCamera(f.x,boat.x,W); f.y=wrapToCamera(f.y,boat.y,H);
    f.scx=wrapToCamera(f.scx,boat.x,W); f.scy=wrapToCamera(f.scy,boat.y,H);
  });

  // Caustics & clouds
  caustics.forEach(c=>{ c.x+=c.vx; c.y+=c.vy; c.phase+=.013; c.rot+=.004;
    c.x=wrapToCamera(c.x,boat.x,W); c.y=wrapToCamera(c.y,boat.y,H); });
  cloudShadows.forEach(c=>{ c.x+=c.speed; c.x=wrapToCamera(c.x,boat.x,W); c.y=wrapToCamera(c.y,boat.y,H); });

  // Particles & ripples
  particles=particles.filter(p=>p.life>0); particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;});
  ripples=ripples.filter(r=>r.r<r.maxR); ripples.forEach(r=>{r.r+=.9;r.life=1-r.r/r.maxR;});

  // Casting
  if (state==='casting') {
    line.progress+=.045;
    if (line.progress>=1) {
      line.progress=1; state='waiting'; playSplash(); addRipple(line.tx,line.ty); addParticles(line.tx,line.ty,'#88ccff',5);
      const wt=(600+Math.random()*2000)*ROD_DEFS[currentRodIdx].waitMult;
      biteTimer=Date.now()+wt; biteWindow=3000+Math.random()*1500+stats.biteWindowBonus;
      setTimeout(()=>{ if(state==='waiting') showMsg(WAIT_MSGS[Math.floor(Math.random()*WAIT_MSGS.length)],4000); },1500);
    }
  }
  if (state==='waiting') {
    line.bobY+=.08*line.bobDir; if(Math.abs(line.bobY)>4) line.bobDir*=-1;
    if (Date.now()>=biteTimer) {
      state='biting'; currentFish=rollFish(); playSplash(); addRipple(line.tx,line.ty);
      showMsg("🐟 BITE! REEL IT IN!",2000);
      document.getElementById('reel-btn').style.display='inline-block';
      setTimeout(()=>{ if(state==='biting') fishEscaped(); },biteWindow);
    }
    if (Math.random()<.002) addRipple(line.tx+(Math.random()-.5)*20,line.ty+(Math.random()-.5)*20);
  }

  // Pirate spawn — max grows with kills
  const maxP = pirateKills<6?2:pirateKills<16?3:4;
  pirateSpawnTimer++;
  if (pirateSpawnTimer>=PIRATE_SPAWN_INTERVAL && pirates.filter(p=>p.deathTimer<0).length<maxP) {
    pirateSpawnTimer=0; spawnPirate();
  }

  // Pirate AI
  pirates.forEach(p=>{
    if (p.deathTimer>=0) return;
    p.x=wrapToCamera(p.x,boat.x,W); p.y=wrapToCamera(p.y,boat.y,H);
    const dx=boat.x-p.x, dy=boat.y-p.y, dist=Math.sqrt(dx*dx+dy*dy);
    const t=p.tier;
    const boardDist=65*getBoatScale();
    if (dist>boardDist) { p.vx+=(dx/dist)*t.accel; p.vy+=(dy/dist)*t.accel; }
    const ps=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if (ps>t.speed) { p.vx=p.vx/ps*t.speed; p.vy=p.vy/ps*t.speed; }
    p.vx*=.9; p.vy*=.9;
    if (ps>.2) { const ta=Math.atan2(p.vy,p.vx); let da=ta-p.angle; while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2; p.angle+=da*.09; }
    p.x+=p.vx; p.y+=p.vy;
    if (p.hitFlash>0) p.hitFlash--;

    // Alert
    if (dist<stats.alertDist && !p.alertShown) {
      p.alertShown=true;
      showMsg(`☠ ${t.name} spotted! LEFT CLICK to shoot! ☠`,4000);
    }

    // Boarding steal
    if (dist<boardDist) {
      p.boardTimer++;
      if (p.boardTimer%90===0) {
        const raw=Math.floor(money*t.stealPct)+t.stealFlat;
        const stolen=Math.min(money,Math.round(raw*stats.boardDmgMult));
        money=Math.max(0,money-stolen);
        document.getElementById('money-stat').textContent=money;
        showMsg(`☠ [${t.name}] boarded! Lost $${stolen}! SHOOT THEM!`,2500);
        addParticles(boat.x,boat.y,'#ff2200',12);
      }
    } else { p.boardTimer=0; }

    // Pirate fires back (tier 3+)
    if (t.fireInterval>0 && dist>70 && dist<480) {
      p.fireTimer++;
      if (p.fireTimer>=t.fireInterval) {
        p.fireTimer=0;
        const spread=(Math.random()-.5)*.18;
        const fa=Math.atan2(boat.y-p.y, boat.x-p.x)+spread;
        pirateBullets.push({ x:p.x+Math.cos(fa)*38, y:p.y+Math.sin(fa)*38,
          vx:Math.cos(fa)*t.bulletSpeed, vy:Math.sin(fa)*t.bulletSpeed,
          life:1, stealAmt:t.bulletSteal });
        playPirateFire();
      }
    }
  });

  // Death timer
  pirates.forEach(p=>{ if(p.hp<=0&&p.deathTimer<0) p.deathTimer=0; });
  pirates=pirates.filter(p=>{ if(p.deathTimer>=0){p.deathTimer++;return p.deathTimer<80;} return true; });

  // Player bullets
  bullets.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy; b.life-=b.decay;
    pirates.forEach(p=>{
      if (p.hp<=0||p.deathTimer>=0) return;
      const dx=p.x-b.x, dy=p.y-b.y;
      if (Math.sqrt(dx*dx+dy*dy)<24*p.tier.size&&b.life>0) {
        b.life=0; p.hp--; p.hitFlash=14;
        playHit(); addParticles(p.x,p.y,'#ff5500',10); addParticles(p.x,p.y,'#884400',6);
        if (p.hp<=0) {
          pirateKills++;
          document.getElementById('kills-stat').textContent=pirateKills;
          const reward=p.tier.rewardMin+Math.floor(Math.random()*(p.tier.rewardMax-p.tier.rewardMin));
          money+=reward; document.getElementById('money-stat').textContent=money;
          showMsg(`💀 ${p.tier.name} SUNK! +$${reward} bounty!`,3000);
          playSink();
          explosions.push({x:p.x,y:p.y,r:6,life:1,vr:3.5});
          explosions.push({x:p.x+10,y:p.y-8,r:4,life:.9,vr:2.5});
          explosions.push({x:p.x-12,y:p.y+6,r:3,life:.8,vr:2});
          for(let i=0;i<20;i++){const ea=Math.random()*Math.PI*2;
            particles.push({x:p.x,y:p.y,color:i%3===0?'#ffcc00':i%3===1?'#ff6600':'#884400',
              vx:Math.cos(ea)*(2+Math.random()*5),vy:Math.sin(ea)*(2+Math.random()*5),
              life:1,decay:.02+Math.random()*.02,r:3+Math.random()*5});}
          // Unlock message
          const next=PIRATE_TIERS.find(t=>t.minKills===pirateKills);
          if (next) setTimeout(()=>showMsg(`⚠ WARNING: ${next.name}s now patrol these waters!`,5000),2000);
        }
      }
    });
  });
  bullets=bullets.filter(b=>b.life>0);

  // Pirate bullets
  pirateBullets.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy; b.life-=.008;
    const dx=boat.x-b.x, dy=boat.y-b.y;
    if (Math.sqrt(dx*dx+dy*dy)<30*getBoatScale()&&b.life>0) {
      b.life=0;
      const stolen=Math.min(money,Math.round(b.stealAmt*getBoatStats().pirateBulletMult));
      money=Math.max(0,money-stolen);
      document.getElementById('money-stat').textContent=money;
      showMsg(`💥 Cannonball hit! Lost $${stolen}!`,2000);
      playHit(); addParticles(boat.x,boat.y,'#ff6600',8);
    }
  });
  pirateBullets=pirateBullets.filter(b=>b.life>0);

  // Explosions
  explosions=explosions.filter(e=>e.life>0);
  explosions.forEach(e=>{e.r+=e.vr;e.life-=.038;});
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw() {
  const camX=W/2-boat.x, camY=H/2-boat.y;
  // Ocean BG — deep realistic ocean
  ctx.fillStyle='#010d18'; ctx.fillRect(0,0,W,H);
  const og=ctx.createRadialGradient(W/2,H*.38,0,W/2,H/2,Math.max(W,H)*.9);
  og.addColorStop(0,  'rgba(18,100,155,0.92)');
  og.addColorStop(.22,'rgba(10, 72,118,0.94)');
  og.addColorStop(.50,'rgba( 5, 45, 82,0.96)');
  og.addColorStop(.78,'rgba( 3, 25, 52,0.98)');
  og.addColorStop(1,  'rgba( 1,  8, 28,1.00)');
  ctx.fillStyle=og; ctx.fillRect(0,0,W,H);

  // Slow-parallax depth bands (0.3× camera speed — suggests layered depth)
  const pb=[{off:0.18,h:70,a:0.018},{off:0.42,h:55,a:0.014},{off:0.67,h:65,a:0.016},{off:0.86,h:50,a:0.012}];
  pb.forEach(b=>{
    const by=H*b.off + (camY*0.3)%H;
    const g=ctx.createLinearGradient(0,by-b.h/2,0,by+b.h/2);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(.5,`rgba(2,12,32,${b.a})`); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,by-b.h/2,W,b.h);
  });

  ctx.save(); ctx.translate(camX,camY);

  // Caustics
  caustics.forEach(c=>{
    const pulse=(Math.sin(c.phase)+1)*.5, alpha=.025+pulse*.055;
    const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.rx);
    g.addColorStop(0,`rgba(130,230,255,${alpha})`); g.addColorStop(1,'rgba(100,200,255,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(c.x,c.y,c.rx,c.ry,c.rot,0,Math.PI*2); ctx.fill();
  });

  // Primary swells (NE–SW)
  ctx.lineWidth=1.2;
  for (let j=0;j<14;j++) {
    const baseY=boat.y-H/2+((j*(H/11))+frame*.38)%H;
    const alpha=.018+Math.abs(Math.sin(j*.7+frame*.006))*.015;
    ctx.strokeStyle=`rgba(100,195,245,${alpha})`; ctx.beginPath();
    const pts=[];
    for(let x=boat.x-W/2;x<=boat.x+W/2;x+=5){
      const y=baseY+Math.sin(x*.024+frame*.028+j*.9)*8+Math.sin(x*.013+frame*.017+j*1.4)*5+Math.sin(x*.05+frame*.05+j*.5)*2;
      if(x===boat.x-W/2) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      pts.push({x,y});
    }
    ctx.stroke();
    // Foam caps: screen-blend small dots at local wave crests
    ctx.globalCompositeOperation='screen';
    pts.forEach((p,i)=>{
      if(i>0&&i<pts.length-1){
        const prev=pts[i-1].y, next=pts[i+1].y;
        const isCrest=(p.y<prev&&p.y<next);
        if(isCrest&&Math.random()<.04){
          ctx.fillStyle=`rgba(220,245,255,${.06+Math.random()*.07})`;
          ctx.beginPath(); ctx.arc(p.x,p.y,1.5+Math.random()*2.5,0,Math.PI*2); ctx.fill();
        }
      }
    });
    ctx.globalCompositeOperation='source-over';
  }
  // Cross-chop (oblique, ~70° to primary — creates interference shimmer)
  ctx.lineWidth=0.9;
  for (let j=0;j<9;j++) {
    const baseX=boat.x-W/2+((j*(W/7))+frame*.26)%W;
    const alpha=.010+Math.abs(Math.sin(j*.9+frame*.008))*.009;
    ctx.strokeStyle=`rgba(70,165,220,${alpha})`; ctx.beginPath();
    for(let y=boat.y-H/2;y<=boat.y+H/2;y+=6){
      const x=baseX+Math.sin(y*.022+frame*.022+j*1.2)*10+Math.sin(y*.038+frame*.038+j*.7)*5;
      if(y===boat.y-H/2) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // Sun sparkles — additive blend so they bloom against dark water
  ctx.globalCompositeOperation='lighter';
  sparkles.forEach(sp=>{
    sp.x=wrapToCamera(sp.x,boat.x,W); sp.y=wrapToCamera(sp.y,boat.y,H);
    sp.phase+=sp.freq;
    const alpha=Math.max(0,Math.sin(sp.phase))*.55;
    if(alpha>.06){
      // 4-point star shape
      ctx.save(); ctx.translate(sp.x,sp.y); ctx.globalAlpha=alpha;
      ctx.fillStyle='rgba(255,248,190,1)';
      ctx.beginPath();
      for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2,r=i%2===0?sp.size:sp.size*.22;if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
      ctx.closePath(); ctx.fill();
      // Soft glow halo
      const g=ctx.createRadialGradient(0,0,0,0,0,sp.size*3.5);
      g.addColorStop(0,`rgba(255,245,160,${alpha*.4})`); g.addColorStop(1,'rgba(255,245,160,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,sp.size*3.5,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.restore();
    }
  });
  ctx.globalCompositeOperation='source-over';

  // Cloud shadows
  cloudShadows.forEach(c=>{ ctx.fillStyle='rgba(0,8,35,0.1)'; ctx.beginPath(); ctx.ellipse(c.x,c.y,c.rx,c.ry,0,0,Math.PI*2); ctx.fill(); });

  // Islands
  islands.forEach(drawIsland);

  // Fish
  fishies.forEach(drawFishTopDown);

  // Ripples
  ripples.forEach(r=>{ ctx.strokeStyle=`rgba(255,255,255,${r.life*.6})`; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.stroke(); });

  // Wake
  wakeParticles.forEach(w=>{ ctx.strokeStyle=`rgba(210,245,255,${w.life*.5})`; ctx.lineWidth=1.2; ctx.beginPath(); ctx.arc(w.x,w.y,w.r,0,Math.PI*2); ctx.stroke(); });

  // Bow wave spray — glowing white foam at front when moving
  const spd=Math.sqrt(boat.vx*boat.vx+boat.vy*boat.vy);
  if(spd>1.2){
    const bowOp=Math.min((spd-1.2)/3.5,1);
    const bwg=ctx.createRadialGradient(bowX,bowY,0,bowX,bowY,32*getBoatScale());
    bwg.addColorStop(0,`rgba(240,252,255,${bowOp*.65})`);
    bwg.addColorStop(.4,`rgba(200,240,255,${bowOp*.25})`);
    bwg.addColorStop(1,'rgba(180,230,255,0)');
    ctx.globalCompositeOperation='screen';
    ctx.fillStyle=bwg; ctx.beginPath(); ctx.arc(bowX,bowY,32*getBoatScale(),0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over';
  }

  // V-wake
  if (spd>.5) {
    const wop=Math.min(spd/4,1)*.4;
    const sx=boat.x-Math.cos(boat.angle)*33, sy=boat.y-Math.sin(boat.angle)*33;
    [boat.angle+Math.PI+.38, boat.angle+Math.PI-.38].forEach(wa=>{
      const wx=sx+Math.cos(wa)*(50+spd*14), wy=sy+Math.sin(wa)*(50+spd*14);
      const g=ctx.createLinearGradient(sx,sy,wx,wy);
      g.addColorStop(0,`rgba(255,255,255,${wop})`); g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.strokeStyle=g; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(wx,wy); ctx.stroke();
    });
  }

  // Player bullets
  bullets.forEach(b=>{
    ctx.save(); ctx.globalAlpha=Math.min(b.life*1.5,1);
    ctx.strokeStyle='rgba(255,200,50,0.6)'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(b.x-b.vx*4,b.y-b.vy*4); ctx.lineTo(b.x,b.y); ctx.stroke();
    ctx.fillStyle='#ff9900'; ctx.beginPath(); ctx.arc(b.x,b.y,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(b.x-1.2,b.y-1.2,2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.restore();
  });

  // Pirate bullets (red/dark)
  pirateBullets.forEach(b=>{
    ctx.save(); ctx.globalAlpha=Math.min(b.life*1.5,1);
    ctx.strokeStyle='rgba(200,40,0,0.55)'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(b.x-b.vx*3,b.y-b.vy*3); ctx.lineTo(b.x,b.y); ctx.stroke();
    ctx.fillStyle='#330000'; ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#882222'; ctx.beginPath(); ctx.arc(b.x-1,b.y-1,2.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.restore();
  });

  // Explosions
  explosions.forEach(e=>{
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
    g.addColorStop(0,`rgba(255,230,80,${e.life*.9})`); g.addColorStop(.4,`rgba(255,100,0,${e.life*.7})`);
    g.addColorStop(.75,`rgba(180,30,0,${e.life*.4})`); g.addColorStop(1,'rgba(80,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
  });

  // Boat
  drawBoat();

  // Fishing line
  if ((state!=='idle'||lineSnapped)&&line.progress>0) {
    const prog=Math.min(line.progress,1);
    const lx=line.x+(line.tx-line.x)*prog, ly=line.y+(line.ty-line.y)*prog;
    ctx.strokeStyle=lineSnapped?'#ff000099':'rgba(255,255,255,0.8)';
    ctx.lineWidth=1.5; ctx.setLineDash(lineSnapped?[4,4]:[]);
    const dx=lx-bowX,dy=ly-bowY, cpx=(bowX+lx)/2-dy*.18, cpy=(bowY+ly)/2+dx*.18;
    ctx.beginPath(); ctx.moveTo(bowX,bowY); ctx.quadraticCurveTo(cpx,cpy,lx,ly); ctx.stroke();
    ctx.setLineDash([]);
    if (state==='waiting'||state==='biting') {
      const fx=line.tx+Math.cos(frame*.07)*Math.abs(line.bobY)*.6;
      const fy=line.ty+Math.sin(frame*.055)*Math.abs(line.bobY)*.6;
      ctx.strokeStyle=state==='biting'?'rgba(255,80,0,0.8)':'rgba(255,120,0,0.5)';
      ctx.lineWidth=2; ctx.beginPath(); ctx.arc(fx,fy,9,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle=state==='biting'?'#ff2200':'#ff5500';
      ctx.beginPath(); ctx.arc(fx,fy,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(fx-1.5,fy-1.5,2,0,Math.PI*2); ctx.fill();
      if (frame%30===0) addRipple(fx,fy);
    }
  }

  // Pirates
  pirates.forEach(drawPirate);

  // Particles
  particles.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;
  ctx.restore();

  // ── Screen-space UI ──
  if (state==='biting') {
    ctx.fillStyle=`rgba(255,0,0,${.22+Math.sin(frame*.3)*.14})`;
    ctx.fillRect(0,0,W,H);
    ctx.font='bold 22px Boogaloo,cursive'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('⚠ BITE! REEL! REEL! REEL! ⚠',W/2,35);
  }

  // Pirate danger overlay
  const nearestDist=pirates.reduce((best,p)=>{
    if(p.deathTimer>=0)return best;
    const d=Math.sqrt((p.x-boat.x)**2+(p.y-boat.y)**2); return d<best?d:best;
  },Infinity);
  if (nearestDist<180) {
    const danger=Math.max(0,1-nearestDist/180);
    ctx.fillStyle=`rgba(120,0,0,${.1+Math.sin(frame*.25)*.07*danger})`; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=`rgba(255,30,0,${.4+Math.sin(frame*.3)*.3})`; ctx.lineWidth=6; ctx.strokeRect(3,3,W-6,H-6);
    if (nearestDist<100) {
      ctx.font='bold 16px Boogaloo,cursive'; ctx.fillStyle=`rgba(255,80,0,${.7+Math.sin(frame*.4)*.3})`;
      ctx.textAlign='center'; ctx.fillText('☠  BOARDING!  CLICK TO SHOOT!  ☠',W/2,22);
    }
  }

  // Radar (top-right)
  const activePirates=pirates.filter(p=>p.deathTimer<0);
  if (activePirates.length>0) {
    const stats=getBoatStats(), rr=22*stats.radarMult;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.beginPath(); ctx.arc(W-30,30,rr,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ff3300'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(W-30,30,rr,0,Math.PI*2); ctx.stroke();
    // Sweep
    const sw=(frame*.04)%(Math.PI*2);
    ctx.strokeStyle=`rgba(255,80,0,${.5+Math.sin(frame*.1)*.2})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(W-30,30); ctx.lineTo(W-30+Math.cos(sw)*rr*0.9,30+Math.sin(sw)*rr*0.9); ctx.stroke();
    // Blips
    activePirates.forEach(p=>{
      const dx=p.x-boat.x, dy=p.y-boat.y, pd=Math.sqrt(dx*dx+dy*dy);
      const maxRange=Math.max(W,H)*0.8/stats.radarMult;
      const scale=Math.min(pd/maxRange,1);
      const bx=W-30+(dx/maxRange)*rr*0.88, by=30+(dy/maxRange)*rr*0.88;
      // Color by tier
      const tierColors=['#ff4400','#ff8800','#ff2200','#cc00ff'];
      ctx.fillStyle=tierColors[p.tier.tier-1]||'#ff4400';
      ctx.beginPath(); ctx.arc(bx,by,2.5,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();
  }

  // ── Sun glint path — bright streak across the water surface ──
  // Runs diagonally from upper-right, stays screen-fixed like real sun path
  const glintAngle = -0.38; // direction of sun (radians from horizontal)
  const gx1 = W/2 - Math.cos(glintAngle)*W*1.2, gy1 = H/2 - Math.sin(glintAngle)*H*1.2;
  const gx2 = W/2 + Math.cos(glintAngle)*W*1.2, gy2 = H/2 + Math.sin(glintAngle)*H*1.2;
  const glint = ctx.createLinearGradient(gx1,gy1,gx2,gy2);
  glint.addColorStop(0,   'rgba(255,245,180,0)');
  glint.addColorStop(0.38,'rgba(255,245,180,0)');
  glint.addColorStop(0.44,'rgba(255,248,200,0.07)');
  glint.addColorStop(0.48,'rgba(255,252,210,0.18)');
  glint.addColorStop(0.50,'rgba(255,255,220,0.24)');
  glint.addColorStop(0.52,'rgba(255,252,210,0.18)');
  glint.addColorStop(0.56,'rgba(255,248,200,0.07)');
  glint.addColorStop(0.62,'rgba(255,245,180,0)');
  glint.addColorStop(1,   'rgba(255,245,180,0)');
  ctx.fillStyle=glint; ctx.fillRect(0,0,W,H);

  // ── Deep ocean vignette (multiply darkens edges, adds atmosphere) ──
  const vig=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.88);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(2,10,26,0.58)');
  ctx.globalCompositeOperation='multiply';
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';

  ctx.textAlign='left';
}

// ── Draw: island ───────────────────────────────────────────────────────────
function drawIsland(isl) {
  ctx.save(); ctx.translate(isl.x,isl.y);

  // Shallow water — reef shelf gradient (deepest → turquoise → white near beach)
  const sw1=ctx.createRadialGradient(0,0,isl.r*.6,0,0,isl.r*2.8);
  sw1.addColorStop(0,'rgba(80,210,190,0.0)');
  sw1.addColorStop(.15,'rgba(65,195,175,0.32)');
  sw1.addColorStop(.45,'rgba(30,150,160,0.22)');
  sw1.addColorStop(.75,'rgba(10, 90,130,0.12)');
  sw1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sw1; ctx.beginPath(); ctx.arc(0,0,isl.r*2.8,0,Math.PI*2); ctx.fill();
  // Inner reef highlight (sandy/turquoise strip)
  const sw2=ctx.createRadialGradient(0,0,isl.r*.85,0,0,isl.r*1.4);
  sw2.addColorStop(0,'rgba(140,230,210,0.0)');
  sw2.addColorStop(.5,'rgba(120,215,200,0.28)');
  sw2.addColorStop(1,'rgba(80,180,175,0.0)');
  ctx.fillStyle=sw2; ctx.beginPath(); ctx.arc(0,0,isl.r*1.4,0,Math.PI*2); ctx.fill();

  // Foam ring
  ctx.strokeStyle=`rgba(220,248,255,${.45+Math.sin(frame*.04+isl.r)*.18})`; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.ellipse(0,0,isl.r+5,isl.r*.7+5,0,0,Math.PI*2); ctx.stroke();
  // Secondary foam ripple
  ctx.strokeStyle=`rgba(200,240,255,${.15+Math.sin(frame*.04+isl.r+1.5)*.1})`; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,0,isl.r+10,isl.r*.7+10,0,0,Math.PI*2); ctx.stroke();

  // Shadow (radial gradient — reads as 3D object on water, not cutout)
  const sh=ctx.createRadialGradient(8,10,0,4,6,isl.r*1.35);
  sh.addColorStop(0,'rgba(0,5,20,0.4)'); sh.addColorStop(1,'rgba(0,5,20,0)');
  ctx.fillStyle=sh; ctx.beginPath(); ctx.ellipse(4,6,isl.r*1.1,isl.r*.85,0,0,Math.PI*2); ctx.fill();
  // Sun-side subsurface scatter (NW highlight suggests sunlight from upper-right)
  const sss=ctx.createRadialGradient(-isl.r*.4,-isl.r*.35,0,-isl.r*.3,-isl.r*.25,isl.r*.9);
  sss.addColorStop(0,'rgba(60,180,120,0.09)'); sss.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sss; ctx.beginPath(); ctx.arc(-isl.r*.2,-isl.r*.15,isl.r,0,Math.PI*2); ctx.fill();
  // Sand
  ctx.fillStyle=isl.sandColor; ctx.beginPath(); ctx.ellipse(0,0,isl.r,isl.r*.7,0,0,Math.PI*2); ctx.fill();
  const sg=ctx.createRadialGradient(0,-isl.r*.1,0,0,0,isl.r);
  sg.addColorStop(0,'rgba(255,255,240,0.35)'); sg.addColorStop(1,'rgba(160,130,60,0.2)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.ellipse(0,0,isl.r,isl.r*.7,0,0,Math.PI*2); ctx.fill();
  // Jungle
  if (isl.hasJungle) {
    ctx.fillStyle='#2e7b2e'; ctx.beginPath(); ctx.ellipse(0,0,isl.r*.58,isl.r*.58*.7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3d9a3d'; ctx.beginPath(); ctx.ellipse(-isl.r*.05,-isl.r*.05,isl.r*.48,isl.r*.48*.7,.2,0,Math.PI*2); ctx.fill();
  }
  // Rocks
  isl.rocks.forEach(rock=>{
    ctx.fillStyle='#7a7c68'; ctx.beginPath(); ctx.ellipse(rock.dx*isl.r*.82,rock.dy*isl.r*.82,rock.r,rock.r*.7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.ellipse(rock.dx*isl.r*.82-1,rock.dy*isl.r*.82-1,rock.r*.5,rock.r*.3,0,0,Math.PI*2); ctx.fill();
  });
  // Palms
  isl.palmAngles.forEach(pa=>{
    const px=Math.cos(pa)*isl.r*.4, py=Math.sin(pa)*isl.r*.4*.7;
    ctx.fillStyle='#7a5c28'; ctx.beginPath(); ctx.arc(px,py,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,30,0,0.3)'; ctx.beginPath(); ctx.arc(px+2,py+2,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1e7a1e'; ctx.beginPath(); ctx.arc(px,py,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#28a028'; ctx.beginPath(); ctx.arc(px-2,py-2,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#8B6914'; ctx.beginPath(); ctx.arc(px+2,py+1,2,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// ── Draw: pirate (tiered) ──────────────────────────────────────────────────
function drawPirate(p) {
  const t=p.tier;
  ctx.save(); ctx.translate(p.x,p.y);
  // Death animation
  if (p.deathTimer>=0) {
    const dt=p.deathTimer/80;
    ctx.globalAlpha=1-dt; ctx.scale(1+dt*.5,1+dt*.5); ctx.rotate(dt*Math.PI*2);
  } else if (p.hitFlash>0&&p.hitFlash%3<2) {
    ctx.globalAlpha=.5;
  }
  // HP bar (unrotated)
  if (p.deathTimer<0) {
    const bw=44*t.size, by=-32*t.size;
    ctx.fillStyle='#220000'; ctx.fillRect(-bw/2,by,bw,5);
    ctx.fillStyle=t.hpBarColor; ctx.fillRect(-bw/2,by,bw*(p.hp/p.maxHp),5);
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=.7; ctx.strokeRect(-bw/2,by,bw,5);
    ctx.font=`${Math.round(7*t.size)}px Boogaloo,cursive`; ctx.fillStyle=t.hpBarColor; ctx.textAlign='center';
    ctx.fillText(t.name,0,by-3);
    // Tier indicator pips
    for(let i=0;i<t.tier;i++){
      ctx.fillStyle=t.hpBarColor;
      ctx.beginPath(); ctx.arc(-bw/2+(i+.5)*(bw/t.tier),by+10,2.5,0,Math.PI*2); ctx.fill();
    }
  }
  // Ship (rotated + scaled)
  ctx.rotate(p.angle); ctx.scale(t.size,t.size);
  // Tier 4 purple glow
  if(t.tier===4){const g=ctx.createRadialGradient(0,0,5,0,0,60);g.addColorStop(0,'rgba(100,0,140,0.35)');g.addColorStop(1,'rgba(60,0,80,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,60,0,Math.PI*2);ctx.fill();}
  // Tier 3 red glow
  if(t.tier===3){const g=ctx.createRadialGradient(0,0,5,0,0,45);g.addColorStop(0,'rgba(180,20,0,0.25)');g.addColorStop(1,'rgba(100,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,45,0,Math.PI*2);ctx.fill();}
  // Shadow
  ctx.save(); ctx.translate(5,6); ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.ellipse(0,0,36,16,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  // Hull layers
  ctx.fillStyle=t.hullColor; ctx.beginPath(); ctx.ellipse(0,0,36,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=t.tier===4?'#180a18':'#2a1205'; ctx.beginPath(); ctx.ellipse(0,0,32,13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=t.deckColor; ctx.beginPath(); ctx.ellipse(0,0,28,11,0,0,Math.PI*2); ctx.fill();
  // Tier 4 gold trim
  if(t.tier===4){ctx.strokeStyle='#aa7700';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,34,15,0,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='#cc9900';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(0,0,30,12,0,0,Math.PI*2);ctx.stroke();}
  // Tier 2 orange ring
  if(t.tier===2){ctx.strokeStyle='#884400';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(0,0,34,15,0,0,Math.PI*2);ctx.stroke();}
  // Deck planks
  ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=.8;
  for(let py=-8;py<=8;py+=4){const hw=28*Math.sqrt(Math.max(0,1-(py/11)**2));ctx.beginPath();ctx.moveTo(-hw*.9,py);ctx.lineTo(hw*.9,py);ctx.stroke();}
  // Mast
  ctx.fillStyle='#1a0a00'; ctx.beginPath(); ctx.arc(0,0,4.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=t.tier===4?'#553300':'#3d1f00'; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
  // Flag
  ctx.fillStyle=t.tier===4?'#220022':'#111'; ctx.fillRect(18,-5.5,13,8);
  ctx.fillStyle=t.tier===4?'#cc8800':'#eee';
  ctx.font='bold 8px serif'; ctx.textAlign='center'; ctx.fillText(t.tier>=3?'💀':'☠',24.5,0);
  // Cannons — more for higher tiers
  const cp=t.tier>=3?[-8,0,8]:t.tier===2?[-5,5]:[-4,4];
  const showCnt=t.tier>=3?3:2;
  ctx.fillStyle='#222'; cp.slice(0,showCnt).forEach(cx=>{ctx.beginPath();ctx.arc(cx,14,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx,-14,2.5,0,Math.PI*2);ctx.fill();});
  // Barrel protrusions (tier 3+)
  if(t.tier>=3){ctx.strokeStyle='#444';ctx.lineWidth=3;ctx.lineCap='round';
    cp.slice(0,showCnt).forEach(cx=>{ctx.beginPath();ctx.moveTo(cx,12);ctx.lineTo(cx,19);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,-12);ctx.lineTo(cx,-19);ctx.stroke();});}
  ctx.globalAlpha=1; ctx.restore();
}

// ── Draw: boat with upgrade visuals ───────────────────────────────────────
function drawBoat() {
  const u=ownedUpgrades;
  const bs=getBoatScale();
  ctx.save(); ctx.translate(boat.x,boat.y); ctx.rotate(boat.angle); ctx.scale(bs,bs);
  // Shadow
  ctx.save(); ctx.translate(6,6); ctx.fillStyle='rgba(0,8,40,0.4)'; ctx.beginPath(); ctx.ellipse(0,0,46,22,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  // Keel
  ctx.fillStyle='#1a2840'; ctx.beginPath(); ctx.ellipse(0,0,46,22,0,0,Math.PI*2); ctx.fill();
  // Hull — gold if Dread Vessel
  ctx.fillStyle=u[7]?'#d4aa44':'#f4f6fa'; ctx.beginPath(); ctx.ellipse(0,0,42,19,0,0,Math.PI*2); ctx.fill();
  // Waterline stripe
  ctx.strokeStyle=u[7]?'#7a5500':'#1a4488'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.ellipse(0,0,43,19.5,0,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle=u[7]?'#d4aa44':'#f4f6fa'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,0,40,17.5,0,0,Math.PI*2); ctx.stroke();
  // Deck
  ctx.fillStyle='#dde2ec'; ctx.beginPath(); ctx.ellipse(0,0,38,16,0,0,Math.PI*2); ctx.fill();
  // Grip lines
  ctx.strokeStyle='rgba(170,180,200,0.55)'; ctx.lineWidth=.8;
  for(let py=-12;py<=12;py+=5){const hw=38*Math.sqrt(Math.max(0,1-(py/16)**2));ctx.beginPath();ctx.moveTo(-hw*.88,py);ctx.lineTo(hw*.88,py);ctx.stroke();}
  // Upgrade 1: Reinforced Hull — riveted metal band
  if(u[0]){ctx.strokeStyle='#667788';ctx.lineWidth=3;ctx.setLineDash([4,3]);ctx.beginPath();ctx.ellipse(0,0,43.5,19.5,0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
  // Upgrade 5: Armor Plating — dark plates on hull flanks
  if(u[4]){ctx.fillStyle='rgba(60,80,100,0.5)';ctx.fillRect(-35,-8,10,16);ctx.fillRect(25,-8,10,16);ctx.strokeStyle='#334455';ctx.lineWidth=1;ctx.strokeRect(-35,-8,10,16);ctx.strokeRect(25,-8,10,16);}
  // Cabin
  ctx.fillStyle='#ffffff'; ctx.strokeStyle='#8899bb'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.rect(-28,-9,20,18); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#eef0f8'; ctx.fillRect(-27,-8,18,4);
  ctx.fillStyle='#2a3a5a'; ctx.fillRect(-25,-6,13,5); ctx.fillRect(-25,1,13,5);
  ctx.fillStyle='#334466'; ctx.fillRect(-10,-7,3,14);
  // Upgrade 7: Radar dish on cabin roof
  if(u[6]){
    ctx.fillStyle='#445566'; ctx.beginPath(); ctx.arc(-20,-10,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#88aacc'; ctx.lineWidth=1.5;
    const ra=(frame*.06)%(Math.PI*2);
    ctx.beginPath(); ctx.moveTo(-20,-10); ctx.lineTo(-20+Math.cos(ra)*7,-10+Math.sin(ra)*7); ctx.stroke();
    ctx.strokeStyle='#aaccee'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(-20,-10,6,ra-Math.PI*.5,ra+Math.PI*.5); ctx.stroke();
  }
  // Dread Vessel skull flag
  if(u[7]){
    ctx.fillStyle='#1a0a00'; ctx.beginPath(); ctx.arc(-18,0,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#110011'; ctx.fillRect(-17,-7,10,7);
    ctx.fillStyle='#ffcc00'; ctx.font='bold 7px serif'; ctx.textAlign='center'; ctx.fillText('☠',-12,-3);
  }
  // Red accent arc
  ctx.strokeStyle='#cc2200'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,0,41,18.5,0,-Math.PI*.55,Math.PI*.55); ctx.stroke();
  // Nav lights
  ctx.fillStyle='#00cc55'; ctx.beginPath(); ctx.arc(36,8,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff3300'; ctx.beginPath(); ctx.arc(36,-8,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,200,80,0.25)'; ctx.beginPath(); ctx.arc(36,8,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,50,0,0.25)'; ctx.beginPath(); ctx.arc(36,-8,6,0,Math.PI*2); ctx.fill();
  // Hull sheen
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(0,0,41,18,0,-Math.PI*.65,Math.PI*.05); ctx.stroke();
  // Fishing rod (longer with Extended Rig)
  ctx.strokeStyle='#aabbcc'; ctx.lineWidth=2; ctx.lineCap='round';
  const rodEnd=u[3]?46:34;
  ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(rodEnd,-3); ctx.stroke();
  if(u[3]){ ctx.fillStyle='#8899aa'; ctx.beginPath(); ctx.arc(rodEnd,-3,3,0,Math.PI*2); ctx.fill(); }
  // Cannon (Upgrade 2: Rapid-Fire — visible barrel at bow side)
  if(u[2]){ctx.fillStyle='#335566';ctx.beginPath();ctx.ellipse(32,7,6,3,.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#223344';ctx.beginPath();ctx.arc(38,8,2.5,0,Math.PI*2);ctx.fill();}
  // Magazine upgrade (Upgrade 5): larger barrel
  if(u[5]){ctx.fillStyle='#334422';ctx.beginPath();ctx.ellipse(30,-7,7,3,-.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#223311';ctx.beginPath();ctx.arc(37,-7,3,0,Math.PI*2);ctx.fill();}
  // Engine exhaust (Upgrade 1 engine)
  if(u[1]){
    ctx.fillStyle='#1a1a2a'; ctx.beginPath(); ctx.arc(-42,6,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-42,-6,3,0,Math.PI*2); ctx.fill();
    if(Math.sqrt(boat.vx*boat.vx+boat.vy*boat.vy)>.5){
      ctx.fillStyle=`rgba(100,160,255,${.3+Math.sin(frame*.2)*.2})`;
      ctx.beginPath(); ctx.arc(-42,6,5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-42,-6,5,0,Math.PI*2); ctx.fill();
    }
  }
  // Captain
  const fx=-17,fy=0;
  ctx.fillStyle='#FF8800'; ctx.beginPath(); ctx.arc(fx,fy,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FDBCB4'; ctx.beginPath(); ctx.arc(fx,fy,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=u[7]?'#ffcc00':'#ffffff'; ctx.beginPath(); ctx.arc(fx,fy,3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1a2a5e'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(fx,fy,3,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(fx+1.5,fy,.8,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Draw: fish ─────────────────────────────────────────────────────────────
function drawFishTopDown(f) {
  ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.angle+Math.sin(f.wobble)*.07); ctx.globalAlpha=.52;
  ctx.fillStyle=f.color; ctx.beginPath(); ctx.ellipse(0,0,f.size,f.size*.42,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-f.size*.88,0); ctx.lineTo(-f.size*1.55,-f.size*.38); ctx.lineTo(-f.size*1.55,f.size*.38); ctx.closePath(); ctx.fill();
  if(f.size>14){ctx.globalAlpha=.32;ctx.fillStyle='#001020';ctx.beginPath();ctx.moveTo(-f.size*.25,-f.size*.42);ctx.lineTo(f.size*.18,-f.size*.42);ctx.lineTo(-f.size*.04,-f.size*.82);ctx.closePath();ctx.fill();ctx.globalAlpha=.52;}
  ctx.fillStyle='#001020'; ctx.beginPath(); ctx.arc(f.size*.5,-f.size*.08,Math.max(1.5,f.size*.11),0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(f.size*.52,-f.size*.1,Math.max(.7,f.size*.04),0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1; ctx.restore();
}

// ── Loop ───────────────────────────────────────────────────────────────────
let lastTime=0;
function loop(ts){ const dt=ts-lastTime; lastTime=ts; update(dt); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

const BAITS=["Wet Bread","Belly Button Lint","Old Gummy Bear","Toenail (Large)","Someone's Corn Chip","Sadness"];
let baitIdx=0;
setInterval(()=>{ baitIdx=(baitIdx+1)%BAITS.length; },15000);

document.getElementById('rod-stat').textContent=ROD_DEFS[0].name;
showMsg("WASD to sail · SPACE to cast · LEFT CLICK shoots cannonballs · ⚓ BOAT for upgrades",7000);
</script>
