  /* ─── View Helpers ─── */
  function getEventsForDate(date) {
    const key = fmtKey(date);
    let reg = [];
    try { reg = JSON.parse(localStorage.getItem('sched_'+key)) || []; } catch {}
    const rec = loadRules().filter(r => ruleMatches(r, date)).map(r => ({...r, _rule:true}));
    return [...reg, ...rec];
  }

  function getWeekDates(date) {
    const d = new Date(date); d.setHours(0,0,0,0);
    d.setDate(d.getDate() - d.getDay()); // go to Sunday
    return Array.from({length:7}, (_, i) => { const dd = new Date(d); dd.setDate(d.getDate()+i); return dd; });
  }

  /* ─── Week View ─── */
  const WK_HR_PX = 60;
  function renderWeekView() {
    const altView = document.getElementById('altView');
    const dates = getWeekDates(curDate);
    const todayTime = new Date(); todayTime.setHours(0,0,0,0);
    const rules = loadRules();

    // Pre-load events per day
    const evsByDay = dates.map(d => {
      const key = fmtKey(d);
      let reg = [];
      try { reg = JSON.parse(localStorage.getItem('sched_'+key)) || []; } catch {}
      const rec = rules.filter(r => ruleMatches(r, d)).map(r => ({...r, _rule:true}));
      return [...reg, ...rec];
    });

    let html = '<div class="week-view">';

    // Day-name header row
    html += '<div class="week-header-row"><div class="week-time-spacer"></div>';
    dates.forEach((d) => {
      const isT = d.getTime() === todayTime.getTime();
      html += `<div class="week-day-hd${isT?' is-today':''}" data-date="${fmtKey(d)}">${DAYS_SHORT[d.getDay()]}<span class="wk-num">${d.getDate()}</span></div>`;
    });
    html += '</div>';

    // Body: time column + 7 day columns
    html += '<div class="week-body"><div class="week-time-col">';
    for(let h = START_H; h <= END_H; h++) {
      const h12 = h > 12 ? h-12 : (h===0?12:h);
      html += `<div class="week-time-label">${h12}${h>=12?'pm':'am'}</div>`;
    }
    html += '</div>';

    dates.forEach((d, di) => {
      html += `<div class="week-day-col" id="wkCol${di}" data-date="${fmtKey(d)}">`;
      for(let h = START_H; h <= END_H; h++) {
        html += `<div class="week-hour-row" data-h="${h}" data-date="${fmtKey(d)}"></div>`;
      }
      html += `<div class="week-evt-overlay" id="wkOv${di}"></div>`;
      if(d.getTime() === todayTime.getTime()) {
        const now = new Date();
        if(now.getHours() >= START_H && now.getHours() <= END_H) {
          const top = ((now.getHours()-START_H)+now.getMinutes()/60)*WK_HR_PX;
          html += `<div class="week-now-line" style="top:${top}px"></div>`;
        }
      }
      html += '</div>';
    });

    html += '</div></div>'; // week-body, week-view
    altView.innerHTML = html;

    // Wire up click handlers for hour rows
    altView.querySelectorAll('.week-hour-row').forEach(row => {
      row.addEventListener('click', e => {
        if(e.target.closest('.week-evt')) return;
        curDate = new Date(row.dataset.date+'T00:00:00'); curDate.setHours(0,0,0,0);
        openModal(null, parseInt(row.dataset.h));
      });
    });
    altView.querySelectorAll('.week-day-hd').forEach(hd => {
      hd.addEventListener('click', () => {
        curDate = new Date(hd.dataset.date+'T00:00:00'); curDate.setHours(0,0,0,0);
        setView('day');
      });
    });

    // Render events into each day column
    dates.forEach((d, di) => {
      const events = evsByDay[di];
      if(!events.length) return;
      const ov = document.getElementById(`wkOv${di}`);
      const col = document.getElementById(`wkCol${di}`);
      if(!ov || !col) return;
      const colW = col.offsetWidth;
      const layout = computeLayout(events);
      const margin = 2, gap = 2;
      events.forEach(ev => {
        const { col: c, totalCols } = layout[ev.id] || { col:0, totalCols:1 };
        const evW = (colW - margin*2 - gap*(totalCols-1)) / totalCols;
        const leftPx = margin + c*(evW+gap);
        const color = getCatColor(ev.cat);
        const sMin = toMins(ev.start), eMin = toMins(ev.end);
        const top = ((Math.floor(sMin/60)-START_H)+(sMin%60)/60)*WK_HR_PX;
        const ht = Math.max(((eMin-sMin)/60)*WK_HR_PX, 14);
        const el = document.createElement('div');
        el.className = 'week-evt';
        el.style.cssText = `top:${top}px;height:${ht}px;background:${color};left:${leftPx}px;width:${evW}px;`;
        const title = document.createElement('div');
        title.className = 'week-evt-title';
        title.textContent = ev.title || getActiveCats().find(c=>c.id===ev.cat)?.label || CATS.find(c=>c.id===ev.cat)?.label || '';
        el.appendChild(title);
        el.addEventListener('click', e => {
          e.stopPropagation();
          curDate = new Date(fmtKey(d)+'T00:00:00'); curDate.setHours(0,0,0,0);
          openModal(ev.id, null, !!ev._rule);
        });
        ov.appendChild(el);
      });
    });
  }

  /* ─── Month View ─── */
  function renderMonthView() {
    const altView = document.getElementById('altView');
    const year = curDate.getFullYear(), month = curDate.getMonth();
    const todayTime = new Date(); todayTime.setHours(0,0,0,0);
    const rules = loadRules();
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month+1, 0);
    const startOffset = firstDay.getDay();
    const totalCells = Math.ceil((startOffset + lastDay.getDate()) / 7) * 7;

    let html = '<div class="month-view">';
    html += '<div class="month-day-names">';
    DAYS_SHORT.forEach(d => { html += `<div class="month-day-name">${d}</div>`; });
    html += '</div><div class="month-grid">';

    for(let i = 0; i < totalCells; i++) {
      const d = new Date(year, month, i - startOffset + 1); d.setHours(0,0,0,0);
      const isCurMonth = d.getMonth() === month;
      const isT = d.getTime() === todayTime.getTime();
      const dateStr = fmtKey(d);

      let reg = [];
      try { reg = JSON.parse(localStorage.getItem('sched_'+dateStr)) || []; } catch {}
      const rec = rules.filter(r => ruleMatches(r, d)).map(r => ({...r, _rule:true}));
      const events = [...reg, ...rec].sort((a,b) => toMins(a.start)-toMins(b.start));

      const cls = ['month-cell', isT?'is-today':'', !isCurMonth?'other-month':''].filter(Boolean).join(' ');
      html += `<div class="${cls}" data-date="${dateStr}">`;
      html += `<div class="month-cell-num">${d.getDate()}</div>`;
      const maxShow = 3;
      events.slice(0, maxShow).forEach(ev => {
        const color = getCatColor(ev.cat);
        const label = ev.title || getActiveCats().find(c=>c.id===ev.cat)?.label || CATS.find(c=>c.id===ev.cat)?.label || '';
        html += `<div class="month-evt-pill" style="background:${color}" data-evid="${ev.id}" data-rule="${ev._rule?1:0}">${label}</div>`;
      });
      if(events.length > maxShow) html += `<div class="month-cell-more">+${events.length - maxShow} more</div>`;
      html += '</div>';
    }

    html += '</div></div>';
    altView.innerHTML = html;

    altView.querySelectorAll('.month-cell:not(.other-month)').forEach(cell => {
      cell.addEventListener('click', e => {
        if(e.target.closest('.month-evt-pill')) return;
        curDate = new Date(cell.dataset.date+'T00:00:00'); curDate.setHours(0,0,0,0);
        setView('day');
      });
    });
    altView.querySelectorAll('.month-evt-pill').forEach(pill => {
      pill.addEventListener('click', e => {
        e.stopPropagation();
        const cell = pill.closest('.month-cell');
        curDate = new Date(cell.dataset.date+'T00:00:00'); curDate.setHours(0,0,0,0);
        const fromRule = pill.dataset.rule === '1';
        openModal(pill.dataset.evid, null, fromRule);
      });
    });
  }

  /* ─── Year View ─── */
  function renderYearView() {
    const altView = document.getElementById('altView');
    const year = curDate.getFullYear();
    const todayTime = new Date(); todayTime.setHours(0,0,0,0);
    const rules = loadRules();

    // Pre-scan localStorage for dates with events in this year
    const eventDates = new Set();
    for(let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if(key && key.startsWith('sched_'+year+'-')) {
        try { const evs = JSON.parse(localStorage.getItem(key))||[]; if(evs.length) eventDates.add(key.slice(6)); } catch {}
      }
    }

    let html = '<div class="year-view"><div class="year-grid">';
    for(let m = 0; m < 12; m++) {
      html += '<div class="mini-month">';
      html += `<div class="mini-month-title" data-m="${m}">${MONTHS[m]}</div>`;
      html += '<div class="mini-month-days-hd">';
      DAYS_SHORT.forEach(d => { html += `<div class="mini-month-day-name">${d[0]}</div>`; });
      html += '</div><div class="mini-month-grid">';
      const firstDay = new Date(year, m, 1);
      const lastDay  = new Date(year, m+1, 0);
      const startOffset = firstDay.getDay();
      const totalCells = Math.ceil((startOffset + lastDay.getDate()) / 7) * 7;
      for(let i = 0; i < totalCells; i++) {
        const d = new Date(year, m, i - startOffset + 1); d.setHours(0,0,0,0);
        const isCurMonth = d.getMonth() === m;
        const isT = d.getTime() === todayTime.getTime();
        const dateStr = fmtKey(d);
        const hasEvents = isCurMonth && (eventDates.has(dateStr) || rules.some(r => ruleMatches(r, d)));
        const cls = ['mini-day', isT?'is-today':'', !isCurMonth?'other-month':'', hasEvents?'has-events':''].filter(Boolean).join(' ');
        html += `<div class="${cls}" data-date="${dateStr}" data-m="${m}">${isCurMonth?d.getDate():''}</div>`;
      }
      html += '</div></div>';
    }
    html += '</div></div>';
    altView.innerHTML = html;

    altView.querySelectorAll('.mini-month-title').forEach(title => {
      title.addEventListener('click', () => {
        curDate = new Date(year, parseInt(title.dataset.m), 1); curDate.setHours(0,0,0,0);
        setView('month');
      });
    });
    altView.querySelectorAll('.mini-day:not(.other-month)').forEach(day => {
      day.addEventListener('click', () => {
        curDate = new Date(day.dataset.date+'T00:00:00'); curDate.setHours(0,0,0,0);
        setView('day');
      });
    });
  }

  /* ─── Navigation ─── */
  document.getElementById('prevBtn').addEventListener('click', ()=>{
    if(curView==='day')   curDate.setDate(curDate.getDate()-1);
    if(curView==='week')  curDate.setDate(curDate.getDate()-7);
    if(curView==='month') curDate.setMonth(curDate.getMonth()-1);
    if(curView==='year')  curDate.setFullYear(curDate.getFullYear()-1);
    refresh();
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    if(curView==='day')   curDate.setDate(curDate.getDate()+1);
    if(curView==='week')  curDate.setDate(curDate.getDate()+7);
    if(curView==='month') curDate.setMonth(curDate.getMonth()+1);
    if(curView==='year')  curDate.setFullYear(curDate.getFullYear()+1);
    refresh();
  });
  document.getElementById('todayBtn').addEventListener('click', ()=>{ curDate=new Date(); curDate.setHours(0,0,0,0); refresh(); if(curView==='day') scrollToNow(); });
  document.getElementById('fab').addEventListener('click', ()=>openModal());
  document.getElementById('modalBg').addEventListener('click', e=>{ if(e.target===document.getElementById('modalBg')) closeModal(); });
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape'){ closeModal(); closeSettings(); clearEvtSel(); }
    if(e.key==='Delete'){
      const tag=document.activeElement?.tagName;
      if(tag==='INPUT'||tag==='TEXTAREA') return;
      if(!document.getElementById('modalBg').classList.contains('open')) deleteSelectedEvt();
    }
  });

  function refresh() {
    renderHeader();
    const dayGrid = document.getElementById('dayGrid');
    const altView = document.getElementById('altView');
    if(curView === 'day') {
      dayGrid.style.display = '';
      altView.innerHTML = '';
      renderTimeline();
      renderEvents();
    } else {
      dayGrid.style.display = 'none';
      if(curView === 'week')       renderWeekView();
      else if(curView === 'month') renderMonthView();
      else if(curView === 'year')  renderYearView();
    }
  }
  function scrollToNow() {
    const now=new Date(), h=isToday(curDate)?now.getHours():8;
    window.scrollTo({top:Math.max(0,(Math.max(h,START_H)-START_H-1)*HR_PX+80),behavior:'smooth'});
  }

  /* ─── Event Selection ─── */
  let selectedEvt = null;
  function selectEvt(id, fromRule) {
    document.querySelectorAll('.evt.selected').forEach(el=>el.classList.remove('selected'));
    selectedEvt = { id, fromRule };
    document.querySelector(`.evt[data-id="${id}"]`)?.classList.add('selected');
  }
  function clearEvtSel() {
    document.querySelectorAll('.evt.selected').forEach(el=>el.classList.remove('selected'));
    selectedEvt = null;
  }
  function deleteSelectedEvt() {
    if(!selectedEvt) return;
    const { id, fromRule } = selectedEvt;
    if(fromRule) {
      const rules=loadRules(), rule=rules.find(r=>r.id===id);
      if(rule){ rule.exceptions=[...(rule.exceptions||[]),fmtKey(curDate)]; saveRules(rules); }
    } else {
      saveDay(loadDay().filter(e=>e.id!==id));
    }
    selectedEvt=null; refresh();
  }
  // Clear selection when clicking empty schedule area
  document.getElementById('eventsCol').addEventListener('click', e=>{ if(!e.target.closest('.evt')) clearEvtSel(); });

  /* ─── To-Do ─── */
  const loadSubjects = () => { try { return JSON.parse(localStorage.getItem('todo_subjects'))||['General']; } catch { return ['General']; } };
  const saveSubjects = s  => localStorage.setItem('todo_subjects', JSON.stringify(s));
  const loadTasks    = () => { try { return JSON.parse(localStorage.getItem('todo_tasks'))||[]; } catch { return []; } };
  const saveTasks    = t  => localStorage.setItem('todo_tasks', JSON.stringify(t));

  let activeSub = loadSubjects()[0];

  function renderTabs() {
    const subs = loadSubjects();
    if(activeSub !== '__all__' && !subs.includes(activeSub)) activeSub = subs[0];
    const container = document.getElementById('subTabs');
    container.innerHTML = '';

    /* "All" tab — always first, no delete button */
    const allBtn = document.createElement('button');
    allBtn.className = 'sub-tab' + (activeSub==='__all__'?' active':'');
    allBtn.appendChild(document.createTextNode('All'));
    allBtn.addEventListener('click', ()=>{ activeSub='__all__'; renderTabs(); renderTasks(); });
    container.appendChild(allBtn);

    subs.forEach(sub => {
      const btn = document.createElement('button');
      btn.className = 'sub-tab' + (sub===activeSub?' active':'');
      btn.addEventListener('click', ()=>{ activeSub=sub; renderTabs(); renderTasks(); });
      const label = document.createTextNode(sub);
      btn.appendChild(label);
      if(subs.length > 1) {
        const x = document.createElement('span');
        x.className = 'sub-tab-x'; x.textContent = '×';
        x.addEventListener('click', e=>{ e.stopPropagation(); deleteSub(sub); });
        btn.appendChild(x);
      }
      container.appendChild(btn);
    });
  }

  function makeTaskItem(task) {
    const li  = document.createElement('li');   li.className='todo-item';
    const chk = document.createElement('button'); chk.className='todo-check'+(task.done?' done':'');
    chk.textContent = task.done ? '✓' : '';
    chk.addEventListener('click', ()=>toggleTask(task.id));
    const txt = document.createElement('span');   txt.className='todo-text'+(task.done?' done':'');
    txt.textContent = task.text;
    const del = document.createElement('button'); del.className='todo-del'; del.textContent='×';
    del.addEventListener('click', ()=>deleteTask(task.id));
    li.append(chk, txt, del);
    return li;
  }

  function renderTasks() {
    const list  = document.getElementById('todoList');
    const empty = document.getElementById('todoEmpty');
    const addRow = document.getElementById('todoInputRow');
    list.innerHTML = '';

    if(activeSub === '__all__') {
      addRow.style.display = 'none';
      const allTasks = loadTasks();
      if(!allTasks.length) { empty.style.display='block'; return; }
      empty.style.display = 'none';
      const hint = document.createElement('div');
      hint.className = 'todo-all-hint'; hint.textContent = 'all subjects';
      list.appendChild(hint);
      const subs = loadSubjects();
      subs.forEach(sub => {
        const subTasks = allTasks.filter(t => t.subject === sub);
        if(!subTasks.length) return;
        const hd = document.createElement('div'); hd.className='todo-group-hd'; hd.textContent=sub;
        list.appendChild(hd);
        subTasks.forEach(task => list.appendChild(makeTaskItem(task)));
      });
      return;
    }

    addRow.style.display = '';
    const tasks = loadTasks().filter(t=>t.subject===activeSub);
    empty.style.display = tasks.length ? 'none' : 'block';
    tasks.forEach(task => list.appendChild(makeTaskItem(task)));
  }

  function addTask() {
    if(activeSub==='__all__') return;
    const inp=document.getElementById('todoInp'), text=inp.value.trim(); if(!text) return;
    const tasks=loadTasks(); tasks.push({id:uid(),text,done:false,subject:activeSub}); saveTasks(tasks);
    inp.value=''; renderTasks();
  }
  function toggleTask(id) { const t=loadTasks(),item=t.find(x=>x.id===id); if(item){item.done=!item.done;saveTasks(t);} renderTasks(); }
  function deleteTask(id) { saveTasks(loadTasks().filter(t=>t.id!==id)); renderTasks(); }

  function addSub() {
    const tabs=document.getElementById('subTabs');
    const inp=document.createElement('input'); inp.className='sub-tab-inp'; inp.placeholder='Subject…';
    const commit = () => {
      const name=inp.value.trim();
      if(name){ const s=loadSubjects(); if(!s.includes(name)){s.push(name);saveSubjects(s);activeSub=name;} }
      renderTabs(); renderTasks();
    };
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter')commit(); if(e.key==='Escape'){renderTabs();renderTasks();} });
    inp.addEventListener('blur', commit);
    tabs.appendChild(inp); inp.focus();
  }
  function deleteSub(sub) {
    let s=loadSubjects().filter(x=>x!==sub); if(!s.length) s=['General'];
    saveSubjects(s); saveTasks(loadTasks().filter(t=>t.subject!==sub));
    if(activeSub===sub) activeSub=s[0];
    renderTabs(); renderTasks();
  }

  document.getElementById('addSubBtn').addEventListener('click', addSub);
  document.getElementById('todoAddBtn').addEventListener('click', addTask);
  document.getElementById('todoInp').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });

  /* ─── Init ─── */
  applyTheme(getTheme());
  refresh();
  renderTabs(); renderTasks();
  setTimeout(scrollToNow, 80);
  setInterval(()=>{ refresh(); }, 60000);
</script>
</body>
</html>
