<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Schedule</title>
  <link rel="apple-touch-icon" sizes="512x512" href="icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Schedule">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── THEME VARIABLES ── */
    :root {
      --bg: #0D0F1A;
      --surface: #14172A;
      --surface2: #1C1F35;
      --border: #22263D;
      --border2: #2A2F4A;
      --text: #E8E4D9;
      --text-dim: #7B82A0;
      --text-muted: #353A58;
      --accent: #E8C27A;
      --accent-glow: rgba(232,194,122,0.12);
      --red: #FB7185;
      --header-bg: rgba(13,15,26,0.92);
      --grid-line: rgba(255,255,255,0.014);
      --swatch-border: rgba(255,255,255,0.12);
    }
    [data-theme="light"] {
      --bg: #F4F1EA;
      --surface: #FFFFFF;
      --surface2: #ECEAE2;
      --border: #DEDAD0;
      --border2: #CEC9BE;
      --text: #1C1910;
      --text-dim: #6B6457;
      --text-muted: #ABA69C;
      --accent: #B8892A;
      --accent-glow: rgba(184,137,42,0.1);
      --red: #E04E63;
      --header-bg: rgba(244,241,234,0.94);
      --grid-line: rgba(0,0,0,0.05);
      --swatch-border: rgba(0,0,0,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      transition: background-color .35s, color .35s;
    }
    body {
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    body.is-dragging  { user-select: none; cursor: grabbing !important; }
    body.is-dragging  * { cursor: grabbing !important; }
    body.is-resizing  { user-select: none; cursor: ns-resize !important; }
    body.is-resizing  * { cursor: ns-resize !important; }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: var(--header-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-btn, .icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface2); color: var(--text-dim);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s; flex-shrink: 0;
    }
    .nav-btn:hover, .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .icon-btn { font-size: 16px; }

    .date-block { flex: 1; text-align: center; min-width: 0; }
    .date-weekday {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1px;
    }
    .date-main {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-weight: 900; letter-spacing: -.02em; line-height: 1;
    }
    .date-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); margin-top: 3px; }
    .today-pill {
      display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px;
      letter-spacing: .14em; text-transform: uppercase; padding: 2px 8px;
      border-radius: 20px; background: var(--accent-glow);
      border: 1px solid rgba(232,194,122,.22); color: var(--accent); margin-top: 4px;
    }
    [data-theme="light"] .today-pill { border-color: rgba(184,137,42,.3); }
    .today-pill.hidden { display: none; }
    .event-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .event-count.has-events { color: var(--text-dim); }
    .today-btn {
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em;
      text-transform: uppercase; padding: 6px 11px; border-radius: 20px;
      background: transparent; border: 1px solid var(--border2); color: var(--text-muted);
      cursor: pointer; transition: all .18s; white-space: nowrap; flex-shrink: 0;
    }
    .today-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── SCHEDULE ── */
    .app-body { display: flex; align-items: flex-start; }
    .schedule-wrap { flex: 1; min-width: 0; padding-bottom: 120px; }
    .grid { display: flex; padding: 20px 14px 0; }
    .time-col { width: 58px; flex-shrink: 0; user-select: none; }
    .time-label {
      height: 80px; display: flex; align-items: flex-start;
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--text-muted); transform: translateY(-7px);
      justify-content: flex-end; padding-right: 10px;
    }
    .events-col { flex: 1; position: relative; border-left: 1px solid var(--border); }
    .hour-row {
      height: 80px; border-top: 1px solid var(--border);
      position: relative; cursor: pointer; transition: background .12s;
    }
    .hour-row:last-child { border-bottom: 1px solid var(--border); }
    .hour-row::after {
      content: ''; position: absolute; left: 0; right: 0; top: 50%;
      height: 1px; background: var(--border); opacity: .45;
    }
    .hour-row:hover { background: rgba(232,194,122,.025); }
    [data-theme="light"] .hour-row:hover { background: rgba(184,137,42,.04); }
    .add-hint {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted);
      opacity: 0; transition: opacity .15s; pointer-events: none;
    }
    .hour-row:hover .add-hint { opacity: 1; }

    /* ── EVENTS ── */
    .overlay { position: absolute; inset: 0; pointer-events: none; }
    .evt {
      position: absolute;
      border-radius: 8px; padding: 5px 9px;
      cursor: grab; pointer-events: all;
      overflow: hidden; min-height: 22px;
      transition: filter .14s, box-shadow .14s;
    }
    .evt:hover { filter: brightness(1.1); box-shadow: -3px 0 0 rgba(0,0,0,.2), 0 4px 14px rgba(0,0,0,.3); z-index: 5; }
    .evt.is-dragging-src { opacity: 0.22; pointer-events: none; }
    .evt-title { font-size: 12px; font-weight: 600; color: rgba(0,0,0,.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .evt-time { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(0,0,0,.5); margin-top: 1px; }
    .evt-notes { font-size: 10px; color: rgba(0,0,0,.45); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .evt-recur { position: absolute; top: 4px; right: 6px; font-size: 10px; color: rgba(0,0,0,.38); }

    /* ── RESIZE HANDLE ── */
    .evt-resize {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 12px; cursor: ns-resize;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0 0 8px 8px; opacity: 0; transition: opacity .15s;
    }
    .evt:hover .evt-resize { opacity: 1; }
    .evt-resize::before {
      content: ''; width: 22px; height: 3px;
      border-radius: 2px; background: rgba(0,0,0,.38);
    }
    .resize-badge {
      position: absolute; right: 8px;
      font-family: 'DM Mono', monospace; font-size: 10px;
      background: rgba(0,0,0,.72); color: #fff;
      padding: 2px 7px; border-radius: 4px; white-space: nowrap;
      pointer-events: none; z-index: 20; display: none;
    }

    /* ── DRAG GHOST & PREVIEW ── */
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 1000;
      border-radius: 8px; padding: 5px 9px; min-height: 22px;
      transform: rotate(1.8deg) scale(1.03);
      box-shadow: 0 10px 40px rgba(0,0,0,.5), 0 4px 12px rgba(0,0,0,.3);
      opacity: .9; overflow: hidden;
    }
    .drag-preview {
      position: absolute; left: 6px; right: 6px;
      border-radius: 8px; pointer-events: none; z-index: 3;
      border: 2px dashed rgba(255,255,255,.55); opacity: .55;
      display: flex; align-items: flex-end; padding: 4px 6px;
    }
    [data-theme="light"] .drag-preview { border-color: rgba(0,0,0,.35); }
    .drag-time-badge {
      font-family: 'DM Mono', monospace; font-size: 10px;
      background: rgba(0,0,0,.55); color: #fff;
      padding: 2px 6px; border-radius: 4px; white-space: nowrap;
      pointer-events: none;
    }

    /* ── NOW LINE ── */
    .now-line { position: absolute; left: -1px; right: 0; height: 2px; background: var(--red); pointer-events: none; z-index: 4; }
    .now-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); position: absolute; left: -4px; top: -3.5px; box-shadow: 0 0 6px var(--red); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 6px var(--red)} 50%{box-shadow:0 0 14px var(--red),0 0 22px rgba(251,113,133,.35)} }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 28px; right: 24px; width: 54px; height: 54px;
      border-radius: 50%; background: var(--accent); color: #0D0F1A;
      border: none; font-size: 30px; font-weight: 300; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(232,194,122,.45); transition: all .2s; z-index: 100;
    }
    .fab:hover { transform: scale(1.1) rotate(45deg); box-shadow: 0 6px 30px rgba(232,194,122,.65); }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .22s;
    }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--border2); width: 100%; max-width: 560px;
      padding: 0 22px 40px; max-height: 92vh; overflow-y: auto;
      transform: translateY(110%); transition: transform .3s cubic-bezier(.34,1.3,.64,1);
    }
    .modal-bg.open .modal { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 14px auto 18px; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 20px; }

    .field { margin-bottom: 18px; }
    .field-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 9px; }

    .cats { display: grid; grid-template-columns: repeat(auto-fill, minmax(94px,1fr)); gap: 7px; }
    .cat-pill {
      padding: 8px; border-radius: 8px; border: 2px solid transparent;
      background: var(--surface2); color: var(--text-dim);
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .14s;
    }
    .cat-pill:hover { background: var(--border2); color: var(--text); }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cat-pill.active { background: color-mix(in srgb, var(--cat-color) 16%, transparent); border-color: var(--cat-color); color: var(--cat-color); }

    .repeat-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .rep-btn {
      padding: 7px 13px; border-radius: 20px; border: 1px solid var(--border2);
      background: var(--surface2); color: var(--text-dim);
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all .14s; white-space: nowrap;
    }
    .rep-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .rep-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    .days-picker { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .days-picker.hidden { display: none; }
    .day-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border2);
      background: var(--surface2); color: var(--text-dim);
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; cursor: pointer; transition: all .14s;
    }
    .day-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    .inp {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 10px; padding: 11px 14px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 14px; outline: none; transition: border-color .18s;
    }
    .inp:focus { border-color: var(--accent); }
    .inp::placeholder { color: var(--text-muted); }
    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    input[type="time"].inp::-webkit-calendar-picker-indicator { filter: invert(.45) sepia(1) saturate(.5) hue-rotate(200deg); cursor: pointer; }
    [data-theme="light"] input[type="time"].inp::-webkit-calendar-picker-indicator { filter: none; opacity: .5; }

    .actions { display: flex; gap: 8px; margin-top: 22px; flex-wrap: wrap; }
    .btn { flex: 1; padding: 13px; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .18s; white-space: nowrap; }
    .btn-save { background: var(--accent); color: #0D0F1A; }
    .btn-save:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-cancel { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border2); flex: 0 0 auto; padding: 13px 18px; }
    .btn-cancel:hover { color: var(--text); border-color: var(--text-dim); }
    .btn-del  { background: rgba(251,113,133,.1); color: var(--red); border: 1px solid rgba(251,113,133,.2); flex: 0 0 auto; padding: 13px 14px; }
    .btn-del:hover  { background: rgba(251,113,133,.2); }
    .btn-del-sm     { font-size: 12px; padding: 11px 11px; }
    .btn-dup  { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(232,194,122,.25); flex: 0 0 auto; padding: 13px 14px; }
    .btn-dup:hover  { background: rgba(232,194,122,.2); }
    [data-theme="light"] .btn-dup { border-color: rgba(184,137,42,.3); }
    .recur-note { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .08em; color: var(--accent); background: var(--accent-glow); border: 1px solid rgba(232,194,122,.2); border-radius: 6px; padding: 6px 10px; margin-bottom: 18px; display: none; }
    .recur-note.show { display: block; }

    /* ── SETTINGS PANEL ── */
    .settings-overlay {
      position: fixed; inset: 0; z-index: 300;
      pointer-events: none;
    }
    .settings-overlay.open { pointer-events: all; }
    .settings-backdrop {
      position: absolute; inset: 0; background: transparent; transition: background .28s;
    }
    .settings-overlay.open .settings-backdrop { background: rgba(0,0,0,.45); }
    .settings-panel {
      position: absolute; top: 0; right: 0; bottom: 0; width: 300px;
      background: var(--surface); border-left: 1px solid var(--border2);
      transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .settings-overlay.open .settings-panel { transform: translateX(0); }

    .settings-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 0; margin-bottom: 24px; position: sticky; top: 0;
      background: var(--surface); z-index: 1; padding-top: 20px;
    }
    .settings-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
    .settings-close {
      width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border2);
      background: var(--surface2); color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      transition: all .15s;
    }
    .settings-close:hover { border-color: var(--red); color: var(--red); }

    .settings-body { padding: 0 20px 40px; }
    .settings-section { margin-bottom: 28px; }
    .settings-section-label {
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .16em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; display: block;
    }

    /* Theme grid */
    .theme-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .theme-card {
      border-radius: 10px; overflow: hidden; cursor: pointer; padding: 0;
      border: 2px solid transparent; background: transparent; transition: border-color .18s, transform .14s;
    }
    .theme-card:hover { transform: scale(1.04); }
    .theme-card.active { border-color: var(--accent); }
    .theme-card-preview { height: 48px; width: 100%; display: block; }
    .theme-card-label {
      display: block; font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 500;
      text-align: center; padding: 5px 3px; background: var(--surface2); color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .theme-card.active .theme-card-label { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--surface2)); }

    /* Color rows */
    .color-row {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .color-row:last-child { border-bottom: none; }
    .color-swatch-wrap { position: relative; width: 30px; height: 30px; flex-shrink: 0; cursor: pointer; }
    .color-input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; padding: 0; border: none; }
    .color-swatch { position: absolute; inset: 0; border-radius: 7px; border: 2px solid var(--swatch-border); pointer-events: none; transition: transform .15s; }
    .color-swatch-wrap:hover .color-swatch { transform: scale(1.1); }
    .color-row-name { font-size: 14px; font-weight: 500; flex: 1; }
    .color-row-hint { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); }

    .reset-btn {
      width: 100%; margin-top: 14px; padding: 10px;
      border-radius: 8px; border: 1px solid var(--border2);
      background: transparent; color: var(--text-muted);
      font-family: 'Outfit', sans-serif; font-size: 13px; cursor: pointer; transition: all .15s;
    }
    .reset-btn:hover { border-color: var(--text-dim); color: var(--text); }

    /* Category management */
    .cat-manage-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }
    .cat-manage-row:last-child { border-bottom: none; }
    .cat-manage-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); min-width: 0; }
    .cat-manage-del {
      width: 22px; height: 22px; border-radius: 4px; background: transparent;
      border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      opacity: 0; transition: opacity .15s, color .15s;
    }
    .cat-manage-row:hover .cat-manage-del { opacity: 1; }
    .cat-manage-del:hover { color: var(--red); }
    .add-cat-row { display: flex; align-items: center; gap: 7px; margin: 12px 0 0; }
    .add-cat-inp {
      flex: 1; min-width: 0; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; padding: 8px 10px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; transition: border-color .18s;
    }
    .add-cat-inp:focus { border-color: var(--accent); }
    .add-cat-inp::placeholder { color: var(--text-muted); }
    .add-cat-btn {
      padding: 8px 13px; border-radius: 8px; flex-shrink: 0;
      background: var(--accent); color: #0D0F1A; border: none;
      font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: filter .15s;
    }
    .add-cat-btn:hover { filter: brightness(1.1); }
    .cat-lib-section { margin-top: 18px; }
    .cat-lib-group { margin-bottom: 12px; }
    .cat-lib-group-label {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .15em;
      text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px;
    }
    .cat-lib-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .cat-lib-pill {
      padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2);
      background: var(--surface2); color: var(--text-dim);
      font-size: 11px; font-family: 'Outfit', sans-serif; font-weight: 500;
      cursor: pointer; transition: all .14s; display: flex; align-items: center; gap: 5px;
    }
    .cat-lib-pill:hover:not(.added) { border-color: var(--text-dim); color: var(--text); transform: scale(1.05); }
    .cat-lib-pill.added { opacity: .35; cursor: default; pointer-events: none; }
    .lib-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── SELECTED EVENT ── */
    .evt.selected { outline: 2px solid rgba(255,255,255,.55); outline-offset: 1px; z-index: 6; }
    [data-theme="light"] .evt.selected { outline: 2px solid rgba(0,0,0,.35); }

    /* ── TODO PANEL ── */
    .todo-panel {
      width: 280px; flex-shrink: 0;
      position: sticky; top: 70px;
      height: calc(100vh - 70px);
      overflow-y: auto;
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: var(--bg);
    }
    .todo-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 16px 12px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 2;
    }
    .todo-title-txt { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
    .add-sub-btn {
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .1em;
      text-transform: uppercase; padding: 5px 10px; border-radius: 20px;
      border: 1px solid var(--border2); background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all .15s;
    }
    .add-sub-btn:hover { border-color: var(--accent); color: var(--accent); }

    .sub-tabs-wrap { padding: 10px 16px 0; border-bottom: 1px solid var(--border); }
    .sub-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 10px; }
    .sub-tab {
      position: relative; padding: 5px 26px 5px 12px; border-radius: 20px;
      border: 1px solid var(--border2); background: var(--surface2); color: var(--text-dim);
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all .14s; white-space: nowrap;
    }
    .sub-tab:hover { border-color: var(--text-dim); color: var(--text); }
    .sub-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .sub-tab-x {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      font-size: 13px; line-height: 1; color: var(--text-muted);
      width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: all .12s;
    }
    .sub-tab-x:hover { background: rgba(251,113,133,.2); color: var(--red); }
    .sub-tab.active .sub-tab-x { color: var(--accent); }
    .sub-tab.active .sub-tab-x:hover { color: var(--red); }
    .sub-tab-inp {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-family: 'Outfit', sans-serif;
      border: 1px solid var(--accent); background: var(--surface2); color: var(--text);
      outline: none; width: 110px;
    }

    .todo-body { padding: 14px 16px; flex: 1; }
    .todo-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .todo-inp {
      flex: 1; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; padding: 9px 12px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; transition: border-color .18s;
    }
    .todo-inp:focus { border-color: var(--accent); }
    .todo-inp::placeholder { color: var(--text-muted); }
    .todo-add {
      width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
      background: var(--accent); color: #0D0F1A; border: none;
      font-size: 24px; font-weight: 300; cursor: pointer; transition: filter .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .todo-add:hover { filter: brightness(1.1); }

    .todo-list { list-style: none; }
    .todo-item {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-check {
      width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
      border: 2px solid var(--border2); background: transparent; cursor: pointer;
      transition: all .15s; display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #0D0F1A;
    }
    .todo-check.done { background: var(--accent); border-color: var(--accent); }
    .todo-text { flex: 1; font-size: 13px; line-height: 1.45; word-break: break-word; color: var(--text); }
    .todo-text.done { text-decoration: line-through; color: var(--text-muted); }
    .todo-del {
      width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; margin-top: 1px;
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s, color .15s;
    }
    .todo-item:hover .todo-del { opacity: 1; }
    .todo-del:hover { color: var(--red); }
    .todo-empty { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); text-align: center; padding: 24px 0; display: none; }
    .todo-group-hd {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--text-muted);
      padding: 12px 0 5px; margin-top: 2px;
    }
    .todo-group-hd:first-child { padding-top: 0; }
    .todo-all-hint {
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted);
      text-align: center; padding: 10px 0 4px; letter-spacing: .05em;
    }

    /* ── VIEW TABS ── */
    .view-tabs {
      display: flex; gap: 2px; flex-shrink: 0;
      background: var(--surface2); border-radius: 20px; padding: 3px;
      border: 1px solid var(--border2);
    }
    .view-tab {
      padding: 5px 10px; border-radius: 16px; border: none;
      background: transparent; color: var(--text-muted);
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,.2); }

    /* ── WEEK VIEW ── */
    .week-view { overflow-x: auto; }
    .week-header-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin: 8px 14px 0;
    }
    .week-time-spacer { width: 58px; flex-shrink: 0; }
    .week-day-hd {
      flex: 1; text-align: center; padding: 8px 4px; min-width: 72px;
      border-left: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim);
      cursor: pointer; transition: color .15s;
    }
    .week-day-hd:hover { color: var(--accent); }
    .week-day-hd.is-today { color: var(--accent); }
    .week-day-hd .wk-num {
      display: block; font-family: 'Playfair Display', serif; font-size: 18px;
      font-weight: 900; letter-spacing: -.02em; line-height: 1.1; margin-top: 2px;
    }
    .week-body { display: flex; padding: 0 14px; }
    .week-time-col { width: 58px; flex-shrink: 0; }
    .week-day-col {
      flex: 1; position: relative; border-left: 1px solid var(--border); min-width: 72px;
    }
    .week-hour-row {
      height: 60px; border-top: 1px solid var(--border); position: relative;
      cursor: pointer; transition: background .12s;
    }
    .week-hour-row:last-child { border-bottom: 1px solid var(--border); }
    .week-hour-row::after {
      content: ''; position: absolute; left: 0; right: 0; top: 50%;
      height: 1px; background: var(--border); opacity: .35;
    }
    .week-hour-row:hover { background: rgba(232,194,122,.025); }
    [data-theme="light"] .week-hour-row:hover { background: rgba(184,137,42,.04); }
    .week-time-label {
      height: 60px; display: flex; align-items: flex-start;
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--text-muted); transform: translateY(-6px);
      justify-content: flex-end; padding-right: 10px;
    }
    .week-evt-overlay { position: absolute; inset: 0; pointer-events: none; }
    .week-evt {
      position: absolute; border-radius: 5px; padding: 2px 4px;
      cursor: pointer; pointer-events: all; overflow: hidden; min-height: 14px;
      transition: filter .12s, box-shadow .12s;
    }
    .week-evt:hover { filter: brightness(1.1); z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
    .week-evt-title { font-size: 10px; font-weight: 600; color: rgba(0,0,0,.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .week-now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--red); pointer-events: none; z-index: 4; }
    .week-now-line::before { content: ''; position: absolute; left: -3px; top: -3px; width: 8px; height: 8px; border-radius: 50%; background: var(--red); }

    /* ── MONTH VIEW ── */
    .month-view { padding: 12px 14px 80px; }
    .month-day-names { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 6px; }
    .month-day-name {
      text-align: center; font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); padding: 4px 0;
    }
    .month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .month-cell {
      min-height: 80px; border-radius: 8px; padding: 6px 7px;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: border-color .15s, background .15s; overflow: hidden;
    }
    .month-cell:hover { border-color: var(--border2); background: var(--surface2); }
    .month-cell.is-today { border-color: var(--accent); }
    .month-cell.other-month { opacity: .32; pointer-events: none; }
    .month-cell-num {
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600;
      color: var(--text-dim); margin-bottom: 4px; line-height: 1;
    }
    .month-cell.is-today .month-cell-num { color: var(--accent); }
    .month-evt-pill {
      display: block; font-size: 10px; font-weight: 600;
      color: rgba(0,0,0,.78); border-radius: 3px; padding: 1px 4px; margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: filter .12s;
    }
    .month-evt-pill:hover { filter: brightness(1.12); }
    .month-cell-more { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); margin-top: 2px; }

    /* ── YEAR VIEW ── */
    .year-view { padding: 16px 14px 80px; }
    .year-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }
    .mini-month-title {
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px;
      text-align: center; cursor: pointer; transition: color .15s;
    }
    .mini-month-title:hover { color: var(--accent); }
    .mini-month-days-hd { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 3px; }
    .mini-month-day-name { text-align: center; font-family: 'DM Mono', monospace; font-size: 7px; color: var(--text-muted); }
    .mini-month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
    .mini-day {
      aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text-dim);
      cursor: pointer; position: relative; transition: background .12s, color .12s; line-height: 1;
    }
    .mini-day:hover { background: var(--surface2); color: var(--text); }
    .mini-day.is-today { background: var(--accent); color: #0D0F1A !important; font-weight: 700; }
    .mini-day.other-month { color: transparent; cursor: default; pointer-events: none; }
    .mini-day.has-events::after {
      content: ''; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%);
      width: 3px; height: 3px; border-radius: 50%; background: var(--accent);
    }
    .mini-day.is-today.has-events::after { background: rgba(0,0,0,.4); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    @media (max-width: 768px) {
      .app-body { flex-direction: column; }
      .todo-panel { width: 100%; position: static; height: auto; border-left: none; border-top: 1px solid var(--border); }
      .year-grid { grid-template-columns: repeat(3,1fr); }
    }
    @media (max-width: 480px) {
      .date-main { font-size: 20px; }
      .cats { grid-template-columns: repeat(2,1fr); }
      .today-btn { display: none; }
      .settings-panel { width: 100%; }
      .year-grid { grid-template-columns: repeat(2,1fr); }
      .view-tab { padding: 5px 7px; font-size: 9px; }
      .month-cell { min-height: 58px; padding: 4px 5px; }
    }
  </style>
</head>

<script>
  /* ─── Constants ─── */
  const START_H = 6, END_H = 23, HR_PX = 80;
  const DAYS_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const DAYS_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const CATS = [
    { id:'homework', label:'Homework', color:'#F59E0B' },
    { id:'school',   label:'School',   color:'#34D399' },
    { id:'study',    label:'Study',    color:'#FB923C' },
    { id:'travel',   label:'Travel',   color:'#38BDF8' },
    { id:'meal',     label:'Meal',     color:'#FB7185' },
    { id:'break',    label:'Break',    color:'#A78BFA' },
    { id:'exercise', label:'Exercise', color:'#A3E635' },
    { id:'sleep',    label:'Sleep',    color:'#818CF8' },
    { id:'freetime', label:'Free Time',color:'#F472B6' },
    { id:'other',    label:'Other',    color:'#94A3B8' },
  ];

  const LIBRARY_CATS = [
    { id:'meeting',    label:'Meeting',    color:'#06B6D4', group:'Work' },
    { id:'deepwork',   label:'Deep Work',  color:'#3B82F6', group:'Work' },
    { id:'email',      label:'Email',      color:'#8B5CF6', group:'Work' },
    { id:'call',       label:'Call',       color:'#10B981', group:'Work' },
    { id:'deadline',   label:'Deadline',   color:'#EF4444', group:'Work' },
    { id:'project',    label:'Project',    color:'#F97316', group:'Work' },
    { id:'focus',      label:'Focus',      color:'#0EA5E9', group:'Work' },
    { id:'planning',   label:'Planning',   color:'#64748B', group:'Work' },
    { id:'gym',        label:'Gym',        color:'#84CC16', group:'Health' },
    { id:'run',        label:'Run',        color:'#22C55E', group:'Health' },
    { id:'meditation', label:'Meditation', color:'#C084FC', group:'Health' },
    { id:'doctor',     label:'Doctor',     color:'#F43F5E', group:'Health' },
    { id:'walk',       label:'Walk',       color:'#34D399', group:'Health' },
    { id:'sports',     label:'Sports',     color:'#FB923C', group:'Health' },
    { id:'reading',    label:'Reading',    color:'#FBBF24', group:'Personal' },
    { id:'shopping',   label:'Shopping',   color:'#F472B6', group:'Personal' },
    { id:'chores',     label:'Chores',     color:'#94A3B8', group:'Personal' },
    { id:'social',     label:'Social',     color:'#60A5FA', group:'Personal' },
    { id:'cooking',    label:'Cooking',    color:'#F97316', group:'Personal' },
    { id:'family',     label:'Family',     color:'#EC4899', group:'Personal' },
    { id:'music',      label:'Music',      color:'#A78BFA', group:'Creative' },
    { id:'art',        label:'Art',        color:'#F59E0B', group:'Creative' },
    { id:'writing',    label:'Writing',    color:'#10B981', group:'Creative' },
    { id:'design',     label:'Design',     color:'#06B6D4', group:'Creative' },
    { id:'coding',     label:'Coding',     color:'#6366F1', group:'Creative' },
  ];

  /* ─── App State ─── */
  let curDate   = new Date(); curDate.setHours(0,0,0,0);
  let curView   = 'day';
  let selCat    = CATS[0].id;
  let selRepeat = 'none';
  let selDays   = new Set();
  let editId    = null;
  let isRecur   = false;

  /* ─── Storage ─── */
  const fmtKey    = d  => d.toISOString().split('T')[0];
  const loadDay   = () => { try { return JSON.parse(localStorage.getItem('sched_'+fmtKey(curDate)))||[]; } catch { return []; } };
  const saveDay   = ev => localStorage.setItem('sched_'+fmtKey(curDate), JSON.stringify(ev));
  const loadRules = () => { try { return JSON.parse(localStorage.getItem('recur_rules'))||[]; } catch { return []; } };
  const saveRules = rs => localStorage.setItem('recur_rules', JSON.stringify(rs));
  const uid       = () => Date.now().toString(36)+Math.random().toString(36).slice(2);

  /* ─── Color management ─── */
  function getCatColors()  { try { return JSON.parse(localStorage.getItem('cat_colors'))||{}; } catch { return {}; } }
  function saveCatColor(id,color) { const c=getCatColors(); c[id]=color; localStorage.setItem('cat_colors',JSON.stringify(c)); }
  function resetCatColors() { localStorage.removeItem('cat_colors'); }

  function getActiveCats()  { try { const s=JSON.parse(localStorage.getItem('active_cats')); return (s&&s.length)?s:[...CATS]; } catch { return [...CATS]; } }
  function saveActiveCats(cats) { localStorage.setItem('active_cats', JSON.stringify(cats)); }
  function getCatColor(id)  { return getCatColors()[id] || getActiveCats().find(c=>c.id===id)?.color || CATS.find(c=>c.id===id)?.color || '#94A3B8'; }

  /* ─── Theme ─── */
  const BG_THEMES = [
    { id:'dark',   label:'🌙 Dark',    preview:'linear-gradient(135deg,#0D0F1A,#1C1F35)' },
    { id:'light',  label:'☀️ Light',   preview:'linear-gradient(135deg,#F4F1EA,#ECEAE2)' },
    { id:'beach',  label:'🏖 Beach',   preview:'linear-gradient(180deg,#5bb8d4 0%,#87ceeb 40%,#f2e0b0 70%,#c49060 100%)' },
    { id:'forest', label:'🌲 Forest',  preview:'linear-gradient(180deg,#0c1a0c,#1a3a12 60%,#0a1608)' },
    { id:'dino',   label:'🦕 Dino',    preview:'linear-gradient(155deg,#1c3210,#2d4a18,#182c0c)' },
    { id:'space',  label:'🚀 Space',   preview:'radial-gradient(ellipse at 40% 40%,#0d0535,#030410)' },
    { id:'sunset', label:'🌅 Sunset',  preview:'linear-gradient(180deg,#180430,#8b1a5a 45%,#f05a18 75%,#ffc038)' },
    { id:'candy',  label:'🍭 Candy',   preview:'linear-gradient(135deg,#ffd0f8,#eac4ff,#ffcce8)' },
    { id:'ocean',  label:'🌊 Ocean',   preview:'linear-gradient(180deg,#010816,#031220 50%,#0a2848)' },
    { id:'retro',  label:'👾 Retro',   preview:'radial-gradient(ellipse at 50% 40%,#1a3a08,#050b02)' },
  ];

  function getTheme() { return localStorage.getItem('theme')||'dark'; }
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    document.querySelectorAll('.theme-card').forEach(c => c.classList.toggle('active', c.dataset.t===t));
  }
  function buildThemeGrid() {
    const grid = document.getElementById('themeGrid');
    if(!grid) return;
    const cur = getTheme();
    grid.innerHTML = '';
    BG_THEMES.forEach(th => {
      const card = document.createElement('button'); card.className='theme-card'+(th.id===cur?' active':''); card.dataset.t=th.id;
      const prev = document.createElement('span');   prev.className='theme-card-preview'; prev.style.background=th.preview;
      const lbl  = document.createElement('span');   lbl.className='theme-card-label';    lbl.textContent=th.label;
      card.appendChild(prev); card.appendChild(lbl);
      card.addEventListener('click', ()=>{ applyTheme(th.id); });
      grid.appendChild(card);
    });
  }

  /* ─── Time utils ─── */
  const toMins = t  => { const [h,m]=t.split(':').map(Number); return h*60+m; };
  const toTime = m  => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  const fmt12  = t  => { let [h,m]=t.split(':').map(Number); const a=h>=12?'pm':'am'; if(h>12)h-=12; if(h===0)h=12; return `${h}:${String(m).padStart(2,'0')}${a}`; };

  function isToday(d) { const t=new Date(); t.setHours(0,0,0,0); return d.getTime()===t.getTime(); }
  function relLabel(d) {
    const t=new Date(); t.setHours(0,0,0,0); const diff=Math.round((d-t)/86400000);
    if(!diff) return ''; if(diff===1) return 'Tomorrow'; if(diff===-1) return 'Yesterday';
    return diff>0?`In ${diff} days`:`${-diff} days ago`;
  }

  /* ─── Recurrence ─── */
  function ruleMatches(rule, date) {
    const start = new Date(rule.startDate+'T00:00:00'); start.setHours(0,0,0,0);
    const diff  = Math.round((date-start)/86400000);
    if(diff < 0) return false;
    if((rule.exceptions||[]).includes(fmtKey(date))) return false;
    switch(rule.type) {
      case 'daily':      return true;
      case 'everyother': return diff%2===0;
      case 'weekly':     return date.getDay()===start.getDay();
      case 'custom':     return (rule.days||[]).includes(date.getDay());
      default:           return false;
    }
  }
  function repeatLabel(rule) {
    const start = new Date(rule.startDate+'T00:00:00');
    switch(rule.type) {
      case 'daily':      return 'Repeats every day';
      case 'everyother': return 'Repeats every 2 days';
      case 'weekly':     return `Repeats every ${DAYS_FULL[start.getDay()]}`;
      case 'custom':     return `Repeats on ${(rule.days||[]).map(d=>DAYS_FULL[d]).join(', ')}`;
    }
  }

  function getEvents() {
    const reg = loadDay();
    const rec = loadRules().filter(r=>ruleMatches(r,curDate)).map(r=>({...r, _rule:true}));
    return [...reg, ...rec];
  }

  /* ─── Header ─── */
  function renderHeader() {
    if(curView === 'day') {
      document.getElementById('weekday').textContent = DAYS_FULL[curDate.getDay()];
      document.getElementById('dateBig').textContent = `${MONTHS[curDate.getMonth()]} ${curDate.getDate()}`;
      document.getElementById('todayPill').classList.toggle('hidden', !isToday(curDate));
      const sub=relLabel(curDate), subEl=document.getElementById('dateSub');
      subEl.textContent=sub; subEl.style.display=sub?'':'none';
      const evs=getEvents(), cEl=document.getElementById('evtCount');
      if(!evs.length){cEl.textContent='No events';cEl.classList.remove('has-events');}
      else{cEl.textContent=`${evs.length} event${evs.length>1?'s':''}`;cEl.classList.add('has-events');}
    } else if(curView === 'week') {
      const dates = getWeekDates(curDate);
      const first = dates[0], last = dates[6];
      document.getElementById('weekday').textContent = 'Week';
      if(first.getMonth() === last.getMonth()) {
        document.getElementById('dateBig').textContent = `${MONTHS[first.getMonth()]} ${first.getDate()}–${last.getDate()}`;
      } else {
        document.getElementById('dateBig').textContent = `${MONTHS[first.getMonth()].slice(0,3)} ${first.getDate()} – ${MONTHS[last.getMonth()].slice(0,3)} ${last.getDate()}`;
      }
      document.getElementById('todayPill').classList.add('hidden');
      document.getElementById('dateSub').style.display = 'none';
      document.getElementById('evtCount').textContent = '';
    } else if(curView === 'month') {
      document.getElementById('weekday').textContent = String(curDate.getFullYear());
      document.getElementById('dateBig').textContent = MONTHS[curDate.getMonth()];
      document.getElementById('todayPill').classList.add('hidden');
      document.getElementById('dateSub').style.display = 'none';
      document.getElementById('evtCount').textContent = '';
    } else if(curView === 'year') {
      document.getElementById('weekday').textContent = 'Year';
      document.getElementById('dateBig').textContent = String(curDate.getFullYear());
      document.getElementById('todayPill').classList.add('hidden');
      document.getElementById('dateSub').style.display = 'none';
      document.getElementById('evtCount').textContent = '';
    }
  }

  /* ─── Timeline ─── */
  function renderTimeline() {
    const tc=document.getElementById('timeCol'), ec=document.getElementById('eventsCol'), ov=document.getElementById('overlay');
    ec.querySelectorAll('.hour-row').forEach(r=>r.remove()); tc.innerHTML='';
    for(let h=START_H;h<=END_H;h++) {
      const lbl=document.createElement('div'); lbl.className='time-label';
      const h12=h>12?h-12:(h===0?12:h); lbl.textContent=`${h12}${h>=12?'pm':'am'}`; tc.appendChild(lbl);
      const row=document.createElement('div'); row.className='hour-row'; row.dataset.h=h;
      const hint=document.createElement('span'); hint.className='add-hint'; hint.textContent='+ add'; row.appendChild(hint);
      row.addEventListener('click', e=>{ if(e.target.closest('.evt')) return; openModal(null,h); });
      ec.insertBefore(row, ov);
    }
    ov.querySelector('.now-line')?.remove();
    if(isToday(curDate)) {
      const now=new Date();
      if(now.getHours()>=START_H && now.getHours()<=END_H) {
        const top=((now.getHours()-START_H)+now.getMinutes()/60)*HR_PX;
        const line=document.createElement('div'); line.className='now-line'; line.style.top=top+'px';
        const dot=document.createElement('div'); dot.className='now-dot'; line.appendChild(dot); ov.appendChild(line);
      }
    }
  }

  /* ─── Render Events ─── */
  /* ─── Overlap layout ─── */
  function computeLayout(events) {
    if(!events.length) return {};
    const sorted = [...events].sort((a,b) => {
      const d = toMins(a.start) - toMins(b.start);
      return d !== 0 ? d : toMins(b.end) - toMins(a.end);
    });
    // Greedily assign each event to the first column it fits in
    const colEnds = []; // colEnds[c] = end time of last event placed in column c
    const evCol   = {};
    for(const ev of sorted) {
      const s = toMins(ev.start), e = toMins(ev.end);
      let c = colEnds.findIndex(end => end <= s);
      if(c === -1) c = colEnds.length;
      colEnds[c] = e;
      evCol[ev.id] = c;
    }
    // Each event's width = span of concurrent columns that overlap its time range
    const result = {};
    for(const ev of sorted) {
      const s = toMins(ev.start), e = toMins(ev.end);
      let maxC = evCol[ev.id];
      for(const other of sorted) {
        if(toMins(other.start) < e && toMins(other.end) > s) maxC = Math.max(maxC, evCol[other.id]);
      }
      result[ev.id] = { col: evCol[ev.id], totalCols: maxC + 1 };
    }
    return result;
  }

  function renderEvents() {
    document.getElementById('overlay').querySelectorAll('.evt').forEach(e=>e.remove());
    const events  = getEvents();
    const layout  = computeLayout(events);
    const colEl   = document.getElementById('eventsCol');
    const colW    = colEl.offsetWidth;
    const margin  = 6, gap = 3;

    events.forEach(ev => {
      const { col, totalCols } = layout[ev.id] || { col:0, totalCols:1 };
      const evW   = (colW - margin * 2 - gap * (totalCols - 1)) / totalCols;
      const leftPx = margin + col * (evW + gap);

      const color=getCatColor(ev.cat);
      const sMin=toMins(ev.start), eMin=toMins(ev.end);
      const top=((Math.floor(sMin/60)-START_H)+(sMin%60)/60)*HR_PX;
      const ht=Math.max(((eMin-sMin)/60)*HR_PX, 22);

      const el=document.createElement('div'); el.className='evt';
      el.style.top=top+'px'; el.style.height=ht+'px'; el.style.backgroundColor=color;
      el.style.left=leftPx+'px'; el.style.width=evW+'px';
      el.dataset.id=ev.id; if(ev._rule) el.dataset.rule='1';

      const t=document.createElement('div'); t.className='evt-title'; t.textContent=ev.title||getActiveCats().find(c=>c.id===ev.cat)?.label||CATS.find(c=>c.id===ev.cat)?.label||''; el.appendChild(t);
      if(ht>34){const ti=document.createElement('div');ti.className='evt-time';ti.textContent=`${fmt12(ev.start)} – ${fmt12(ev.end)}`;el.appendChild(ti);}
      if(ht>52&&ev.notes){const no=document.createElement('div');no.className='evt-notes';no.textContent=ev.notes;el.appendChild(no);}
      if(ev._rule){const ri=document.createElement('div');ri.className='evt-recur';ri.textContent='↻';el.appendChild(ri);}

      /* Resize handle */
      const rh=document.createElement('div'); rh.className='evt-resize';
      rh.addEventListener('mousedown',  e=>{e.stopPropagation();e.preventDefault();onResizeDown(e,ev.id,!!ev._rule);});
      rh.addEventListener('touchstart', e=>{e.stopPropagation();e.preventDefault();onResizeDown(e,ev.id,!!ev._rule);},{passive:false});
      el.appendChild(rh);

      /* Pointer handling: separate click vs drag */
      el.addEventListener('mousedown',  e=>onEvtDown(e, ev.id, !!ev._rule));
      el.addEventListener('touchstart', e=>onEvtDown(e, ev.id, !!ev._rule), {passive:false});

      document.getElementById('overlay').appendChild(el);
    });
  }

  /* ─── Drag & Drop ─── */
  let pointerOrigin = null; // { x, y, evId, fromRule }
  let dragState     = null; // active drag
  let resizeState   = null; // active resize

  function getPos(e) {
    if(e.touches && e.touches.length) return { x:e.touches[0].clientX, y:e.touches[0].clientY };
    if(e.changedTouches && e.changedTouches.length) return { x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY };
    return { x:e.clientX, y:e.clientY };
  }

  function onEvtDown(e, evId, fromRule) {
    if(e.button !== undefined && e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    const pos = getPos(e);
    pointerOrigin = { x:pos.x, y:pos.y, evId, fromRule };
  }

  function onDocMove(e) {
    /* Resize takes priority */
    if(resizeState) {
      if(e.cancelable) e.preventDefault();
      moveResize(getPos(e).y);
      return;
    }
    if(!pointerOrigin) return;
    const pos = getPos(e);
    const dx = pos.x - pointerOrigin.x, dy = pos.y - pointerOrigin.y;
    if(!dragState && Math.sqrt(dx*dx+dy*dy) > 7) {
      beginDrag(pointerOrigin.evId, pointerOrigin.fromRule, pos.x, pos.y);
    }
    if(dragState) {
      if(e.cancelable) e.preventDefault();
      moveDrag(pos.x, pos.y);
    }
  }

  function onDocUp(e) {
    if(resizeState) { endResize(); return; }
    const wasOrigin = pointerOrigin;
    const wasDrag   = dragState;
    pointerOrigin = null;
    if(wasDrag) { endDrag(); return; }
    if(wasOrigin && !wasDrag) { selectEvt(wasOrigin.evId, wasOrigin.fromRule); openModal(wasOrigin.evId, null, wasOrigin.fromRule); }
  }

  function beginDrag(evId, fromRule, cx, cy) {
    let ev = fromRule ? loadRules().find(r=>r.id===evId) : loadDay().find(e=>e.id===evId);
    if(!ev) return;

    const evEl = document.querySelector(`.evt[data-id="${evId}"]`);
    if(!evEl) return;
    const evRect = evEl.getBoundingClientRect();
    const color  = getCatColor(ev.cat);
    const dur    = toMins(ev.end) - toMins(ev.start);
    const clickOffY = cy - evRect.top; // px into the event where user grabbed

    /* Ghost: floating clone */
    const ghost = document.createElement('div');
    ghost.className = 'drag-ghost';
    ghost.style.cssText = `background:${color};width:${evRect.width}px;height:${evRect.height}px;`;
    ghost.innerHTML = evEl.innerHTML;
    document.body.appendChild(ghost);

    /* Preview: drop target indicator on timeline */
    const preview = document.createElement('div');
    preview.className = 'drag-preview';
    preview.style.cssText = `background:${color};height:${evEl.style.height};top:${evEl.style.top}`;
    const badge = document.createElement('div'); badge.className='drag-time-badge';
    preview.appendChild(badge);
    document.getElementById('overlay').appendChild(preview);

    evEl.classList.add('is-dragging-src');
    document.body.classList.add('is-dragging');

    dragState = { evId, fromRule, ev, dur, clickOffY, ghost, preview, badge, evEl };
  }

  function moveDrag(cx, cy) {
    if(!dragState) return;
    const { ghost, preview, badge, dur, clickOffY } = dragState;

    /* Position ghost under cursor */
    ghost.style.left = (cx - parseInt(ghost.style.width)/2)+'px';
    ghost.style.top  = (cy - clickOffY)+'px';

    /* Map cursor Y to schedule time */
    const col     = document.getElementById('eventsCol');
    const colRect = col.getBoundingClientRect();
    const offsetY = cy - colRect.top;
    const rawMins = (offsetY / HR_PX)*60 + START_H*60 - (clickOffY/HR_PX)*60;
    const snapped = Math.round(rawMins/15)*15;
    const clamped = Math.max(START_H*60, Math.min((END_H+1)*60 - dur, snapped));

    preview.style.top = ((clamped - START_H*60)/60 * HR_PX)+'px';
    badge.textContent = `${fmt12(toTime(clamped))} – ${fmt12(toTime(clamped+dur))}`;
    dragState.pendingStart = clamped;
  }

  function endDrag() {
    if(!dragState) return;
    const { evId, fromRule, ev, dur, ghost, preview, evEl, pendingStart } = dragState;
    ghost.remove(); preview.remove();
    evEl.classList.remove('is-dragging-src');
    document.body.classList.remove('is-dragging');
    dragState = null;

    if(pendingStart !== undefined) {
      const newStart = toTime(pendingStart);
      const newEnd   = toTime(pendingStart + dur);
      if(fromRule) {
        /* Update rule time directly — no copy */
        const rules = loadRules();
        const rule  = rules.find(r=>r.id===evId);
        if(rule) { rule.start=newStart; rule.end=newEnd; saveRules(rules); }
      } else {
        const evs = loadDay();
        const e = evs.find(e=>e.id===evId);
        if(e) { e.start=newStart; e.end=newEnd; saveDay(evs); }
      }
    }
    refresh();
  }

  /* ─── Resize ─── */
  function onResizeDown(e, evId, fromRule) {
    const evEl = document.querySelector(`.evt[data-id="${evId}"]`);
    if(!evEl) return;
    const ev = fromRule ? loadRules().find(r=>r.id===evId) : loadDay().find(e=>e.id===evId);
    if(!ev) return;

    /* Badge that shows live end time */
    let badge = evEl.querySelector('.resize-badge');
    if(!badge) { badge=document.createElement('div'); badge.className='resize-badge'; evEl.appendChild(badge); }

    resizeState = { evId, fromRule, startMins:toMins(ev.start), evEl, badge };
    evEl.style.zIndex = '10';
    evEl.style.overflow = 'visible';
    document.body.classList.add('is-resizing');
  }

  function moveResize(clientY) {
    if(!resizeState) return;
    const { startMins, evEl, badge } = resizeState;
    const col = document.getElementById('eventsCol');
    const rawMins = ((clientY - col.getBoundingClientRect().top) / HR_PX) * 60 + START_H * 60;
    const snapped = Math.round(rawMins / 15) * 15;
    const clamped = Math.max(startMins + 15, Math.min((END_H + 1) * 60, snapped));

    const newH = Math.max(22, ((clamped - startMins) / 60) * HR_PX);
    evEl.style.height = newH + 'px';

    /* Update inline time text if visible */
    const timeEl = evEl.querySelector('.evt-time');
    if(timeEl) timeEl.textContent = `${fmt12(toTime(startMins))} – ${fmt12(toTime(clamped))}`;

    /* Badge floats just below the event bottom */
    badge.style.top  = (newH + 4) + 'px';
    badge.textContent = fmt12(toTime(clamped));
    badge.style.display = 'block';

    resizeState.pendingEnd = clamped;
  }

  function endResize() {
    if(!resizeState) return;
    const { evId, fromRule, pendingEnd, evEl, badge } = resizeState;
    evEl.style.zIndex = '';
    evEl.style.overflow = '';
    badge.style.display = 'none';
    document.body.classList.remove('is-resizing');
    resizeState = null;

    if(pendingEnd !== undefined) {
      const newEnd = toTime(pendingEnd);
      if(fromRule) {
        const rules = loadRules(), rule = rules.find(r=>r.id===evId);
        if(rule) { rule.end=newEnd; saveRules(rules); }
      } else {
        const evs = loadDay(), ev = evs.find(e=>e.id===evId);
        if(ev) { ev.end=newEnd; saveDay(evs); }
      }
    }
    refresh();
  }

  document.addEventListener('mousemove',  onDocMove);
  document.addEventListener('mouseup',    onDocUp);
  document.addEventListener('touchmove',  onDocMove, { passive:false });
  document.addEventListener('touchend',   onDocUp);

  /* ─── Modal ─── */

  function mkBtn(cls,txt){ const b=document.createElement('button');b.className=`btn ${cls}`;b.textContent=txt;return b; }

  function openModal(id=null, hour=null, fromRule=false) {
    editId=id; isRecur=fromRule;
    const actEl=document.getElementById('actions'), noteEl=document.getElementById('recurNote');
    if(id&&!fromRule) {
      const ev=loadDay().find(e=>e.id===id); if(!ev)return;
      document.getElementById('modalTitle').textContent='Edit Event';
      selCat=ev.cat; selRepeat='none'; selDays=new Set();
      document.getElementById('titleInp').value=ev.title||'';
      document.getElementById('startInp').value=ev.start;
      document.getElementById('endInp').value=ev.end;
      document.getElementById('notesInp').value=ev.notes||'';
      noteEl.classList.remove('show'); buildCats(); buildRepeatUI(false);
      actEl.innerHTML='';
      const d=mkBtn('btn-del','Delete'); d.onclick=()=>doDelete('single'); actEl.appendChild(d);
      const dup=mkBtn('btn-dup','⎘ Dupe'); dup.onclick=()=>doDuplicate(false); actEl.appendChild(dup);
      const c=mkBtn('btn-cancel','Cancel'); c.onclick=closeModal; actEl.appendChild(c);
      const s=mkBtn('btn-save','Save'); s.onclick=doSave; actEl.appendChild(s);
    } else if(id&&fromRule) {
      const rule=loadRules().find(r=>r.id===id); if(!rule)return;
      document.getElementById('modalTitle').textContent='Edit Recurring Event';
      selCat=rule.cat; selRepeat=rule.type; selDays=new Set(rule.days||[]);
      document.getElementById('titleInp').value=rule.title||'';
      document.getElementById('startInp').value=rule.start;
      document.getElementById('endInp').value=rule.end;
      document.getElementById('notesInp').value=rule.notes||'';
      noteEl.textContent=repeatLabel(rule); noteEl.classList.add('show');
      buildCats(); buildRepeatUI(true);
      actEl.innerHTML='';
      const dd=mkBtn('btn-del btn-del-sm','Skip today'); dd.onclick=()=>doDelete('skip'); actEl.appendChild(dd);
      const da=mkBtn('btn-del btn-del-sm','Delete all'); da.onclick=()=>doDelete('all');  actEl.appendChild(da);
      const dup=mkBtn('btn-dup btn-del-sm','⎘ Dupe'); dup.onclick=()=>doDuplicate(true); actEl.appendChild(dup);
      const c=mkBtn('btn-cancel','Cancel'); c.onclick=closeModal; actEl.appendChild(c);
      const s=mkBtn('btn-save','Save all'); s.onclick=doSave; actEl.appendChild(s);
    } else {
      document.getElementById('modalTitle').textContent='New Event';
      selCat=getActiveCats()[0]?.id||CATS[0].id; selRepeat='none'; selDays=new Set();
      document.getElementById('titleInp').value='';
      const h=hour??9;
      document.getElementById('startInp').value=toTime(h*60);
      document.getElementById('endInp').value=toTime(h*60+60);
      document.getElementById('notesInp').value='';
      noteEl.classList.remove('show'); buildCats(); buildRepeatUI(false);
      actEl.innerHTML='';
      const c=mkBtn('btn-cancel','Cancel'); c.onclick=closeModal; actEl.appendChild(c);
      const s=mkBtn('btn-save','Save Event'); s.onclick=doSave; actEl.appendChild(s);
    }
    document.getElementById('modalBg').classList.add('open');
  }
  function closeModal() { document.getElementById('modalBg').classList.remove('open'); editId=null; isRecur=false; }

  function doSave() {
    const start=document.getElementById('startInp').value, end=document.getElementById('endInp').value;
    if(!start||!end) return alert('Please set both times.');
    if(toMins(end)<=toMins(start)) return alert('End time must be after start time.');
    if(selRepeat==='custom'&&selDays.size===0) return alert('Select at least one day for custom repeat.');
    const base={cat:selCat,title:document.getElementById('titleInp').value.trim(),start,end,notes:document.getElementById('notesInp').value.trim()};
    if(isRecur&&editId) {
      const rules=loadRules(); const i=rules.findIndex(r=>r.id===editId);
      if(i!==-1){rules[i]={...rules[i],...base};} saveRules(rules);
    } else if(selRepeat!=='none') {
      const rules=loadRules();
      rules.push({...base,id:uid(),type:selRepeat,days:selRepeat==='custom'?[...selDays].sort():[],startDate:fmtKey(curDate),exceptions:[]});
      saveRules(rules);
    } else {
      const evs=loadDay(); const ev={...base,id:editId||uid()};
      if(editId){const i=evs.findIndex(e=>e.id===editId);if(i!==-1)evs[i]=ev;}else evs.push(ev);
      saveDay(evs);
    }
    closeModal(); refresh();
  }
  function doDelete(mode) {
    if(mode==='single') saveDay(loadDay().filter(e=>e.id!==editId));
    else if(mode==='all') saveRules(loadRules().filter(r=>r.id!==editId));
    else if(mode==='skip'){const rules=loadRules(),rule=rules.find(r=>r.id===editId);if(rule){rule.exceptions=[...(rule.exceptions||[]),fmtKey(curDate)];saveRules(rules);}}
    closeModal(); refresh();
  }

  function doDuplicate(fromRule) {
    const src = fromRule ? loadRules().find(r=>r.id===editId) : loadDay().find(e=>e.id===editId);
    if(!src) return;
    /* Offset duplicate by 30 min so it doesn't stack exactly on top */
    const startMins = toMins(src.start) + 30;
    const endMins   = toMins(src.end)   + 30;
    const evs = loadDay();
    evs.push({ id:uid(), cat:src.cat, title:src.title, start:toTime(startMins), end:toTime(endMins), notes:src.notes||'' });
    saveDay(evs);
    closeModal(); refresh();
  }
